<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>הבית הצהוב – עסק</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --yellow:  #FFD700;
      --yellow-dk:#E6C200;
      --blue:    #003DA5;
      --blue-dk: #002a75;
      --blue-md: #1a56c4;
      --white:   #FFFFFF;
      --bg:      #F5F6FA;
      --gray:    #888;
      --green:   #16a34a;
      --green-bg:#dcfce7;
      --orange:  #d97706;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Heebo', sans-serif; background: var(--bg); color: #1a1a1a; padding-bottom: 100px; }
    ::-webkit-scrollbar { width: 0; }

    /* ── HERO ── */
    .hero {
      height: 220px;
      background: linear-gradient(135deg, var(--blue-dk), var(--blue));
      position: relative;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }

    /* לוגו "הבית הצהוב" בפינה */
    .hero-brand {
      position: absolute; top: 14px; right: 16px;
      display: flex; align-items: center; gap: 6px;
      z-index: 10;
    }
    .hero-brand svg { width: 26px; height: 26px; }
    .hero-brand-text { color: var(--white); font-size: 13px; font-weight: 900; }
    .hero-brand-text span { color: var(--yellow); }

    /* top bar (back + share) */
    .top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between;
      padding: 14px 16px;
      z-index: 10;
    }

    .back-btn {
      width: 36px; height: 36px;
      background: rgba(255,255,255,.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer;
      text-decoration: none; color: var(--white);
      font-weight: 700; border: 1.5px solid rgba(255,255,255,.25);
    }

    .share-btn {
      width: 36px; height: 36px;
      background: rgba(255,255,255,.15);
      border-radius: 50%; border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; cursor: pointer;
      border: 1.5px solid rgba(255,255,255,.25);
    }

    /* לוגו עסק במרכז */
    .hero-logo-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
    }

    .hero-logo {
      width: 80px; height: 80px;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; font-weight: 900;
      color: #fff;
      box-shadow: 0 8px 28px rgba(0,0,0,.3);
      overflow: hidden;
      background: rgba(255,255,255,.15);
    }
    .hero-logo img { width: 100%; height: 100%; object-fit: cover; }

    /* ── CONTENT ── */
    .content { padding: 0 16px; }

    .biz-header {
      background: var(--white);
      border-radius: 20px;
      padding: 20px 18px;
      margin-top: -28px;
      position: relative; z-index: 2;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
    }

    .biz-name { font-size: 22px; font-weight: 900; color: #1a1a1a; }

    .biz-meta {
      display: flex; align-items: center;
      gap: 8px; margin-top: 8px; flex-wrap: wrap;
    }

    .meta-tag {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
    }
    .meta-tag.cat    { background: #EEF3FF; color: var(--blue); }
    .meta-tag.online { background: var(--green-bg); color: var(--green); }
    .meta-tag.city   { background: #f1f5f9; color: var(--gray); font-weight: 400; }
    .meta-tag.views  { background: #fff7ed; color: var(--orange); }

    /* ── SECTION ── */
    .section {
      background: var(--white);
      border-radius: 16px;
      padding: 18px;
      margin-top: 12px;
      box-shadow: 0 2px 10px rgba(0,0,0,.05);
    }

    .section-title {
      font-size: 14px; font-weight: 800;
      color: var(--blue); margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }

    .desc-text { font-size: 14px; color: #555; line-height: 1.7; }

    /* ── GALLERY ── */
    .gallery {
      display: flex; gap: 10px; overflow-x: auto;
      padding-bottom: 4px;
    }
    .gallery::-webkit-scrollbar { display: none; }
    .gallery img {
      height: 130px; min-width: 130px;
      object-fit: cover; border-radius: 12px;
      flex-shrink: 0; cursor: pointer;
    }

    /* ── BENEFIT BOX ── */
    .benefit-box {
      background: linear-gradient(135deg, #FFF8E1, #FFFDE7);
      border: 2px solid #FFE082;
      border-radius: 14px; padding: 16px;
    }
    .benefit-label {
      font-size: 12px; font-weight: 800;
      color: var(--orange); margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .benefit-text { font-size: 17px; font-weight: 800; color: #1a1a1a; }
    .benefit-type { font-size: 12px; color: var(--gray); margin-top: 4px; }

    /* coupon (מוצג ישירות) */
    .coupon-box {
      margin-top: 14px;
      background: var(--blue-dk);
      border-radius: 12px; padding: 16px;
      text-align: center;
    }
    .coupon-lbl { color: rgba(255,255,255,.6); font-size: 11px; font-weight: 600; letter-spacing: 1px; margin-bottom: 8px; }
    .coupon-code { color: var(--yellow); font-size: 28px; font-weight: 900; letter-spacing: 3px; font-family: monospace; }
    .copy-btn {
      margin-top: 10px;
      background: rgba(255,215,0,.15);
      border: 1px solid rgba(255,215,0,.3);
      color: var(--yellow); border-radius: 8px;
      padding: 8px 16px;
      font-family: 'Heebo', sans-serif;
      font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .copy-btn.copied { background: var(--green-bg); border-color: var(--green); color: var(--green); }

    /* physical */
    .physical-box {
      margin-top: 14px;
      background: var(--blue-dk);
      border-radius: 12px; padding: 18px;
      text-align: center;
    }
    .physical-box h4 { color: #fff; font-size: 15px; font-weight: 800; margin: 8px 0; }
    .physical-box p { color: rgba(255,255,255,.6); font-size: 13px; line-height: 1.6; }
    .physical-box a {
      display: inline-block; margin-top: 12px;
      background: var(--yellow); color: var(--blue-dk);
      border-radius: 10px; padding: 10px 20px;
      font-family: 'Heebo', sans-serif;
      font-size: 14px; font-weight: 800; text-decoration: none;
    }

    .clicks-info { font-size: 12px; color: var(--gray); text-align: center; margin-top: 10px; }

    /* ── INFO ROWS ── */
    .info-rows { display: flex; flex-direction: column; gap: 10px; }
    .info-row {
      display: flex; align-items: flex-start; gap: 12px;
    }
    .info-icon { font-size: 17px; flex-shrink: 0; margin-top: 1px; }
    .info-body { flex: 1; line-height: 1.55; }
    .info-lbl { font-size: 11px; color: var(--gray); font-weight: 600; margin-bottom: 3px; }
    .info-body a { color: var(--blue); text-decoration: none; font-weight: 700; }
    .branch-item { font-size: 14px; margin-bottom: 4px; }
    .branch-item a { font-size: 12px; margin-right: 6px; color: var(--blue); }
    .links-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 2px; }
    .links-row a {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--bg); border-radius: 8px;
      padding: 7px 12px; text-decoration: none;
      font-size: 13px; font-weight: 600; color: var(--blue);
    }

    /* ── BOTTOM CTA ── */
    .bottom-cta {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--white);
      border-top: 1px solid #E8EDF5;
      padding: 12px 16px 20px;
      display: flex; gap: 10px;
      box-shadow: 0 -4px 16px rgba(0,0,0,.08);
    }
    .cta-call {
      flex: 1; background: var(--bg);
      border: 2px solid #E8EDF5; border-radius: 12px; padding: 12px;
      font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 700;
      color: var(--blue); cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .cta-whatsapp {
      flex: 2;
      background: linear-gradient(135deg, #25D366, #128C7E);
      border: none; border-radius: 12px; padding: 12px;
      font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 800;
      color: var(--white); cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }

    /* loading */
    #loadingOverlay {
      position: fixed; inset: 0; z-index: 9000;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(0,61,165,.15);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* not found */
    #notFound {
      display: none;
      text-align: center; padding: 60px 20px;
      color: var(--gray); font-size: 15px;
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <div style="font-family:'Heebo',sans-serif;color:var(--blue);font-size:14px;font-weight:700;">טוען...</div>
</div>

<!-- NOT FOUND -->
<div id="notFound">
  <div style="font-size:48px;margin-bottom:16px;">🔍</div>
  <div style="font-size:18px;font-weight:800;color:#1a1a1a;margin-bottom:8px;">העסק לא נמצא</div>
  <div style="margin-bottom:24px;">ייתכן שהקישור שגוי או שהעסק הוסר</div>
  <a href="home.html" style="background:var(--blue);color:#fff;padding:12px 24px;border-radius:12px;text-decoration:none;font-weight:700;">← חזרה לאינדקס</a>
</div>

<!-- HERO -->
<div class="hero" id="heroSection" style="display:none">
  <div class="top-bar">
    <a href="home.html" class="back-btn">‹</a>
    <div class="hero-brand-text">הבית <span>הצהוב</span></div>
    <button class="share-btn" id="shareBtn">⬆️</button>
  </div>

  <!-- לוגו עסק -->
  <div class="hero-logo-wrap">
    <div class="hero-logo" id="heroLogo"></div>
  </div>
</div>

<!-- CONTENT -->
<div class="content" id="pageContent" style="display:none">

  <!-- HEADER -->
  <div class="biz-header">
    <div class="biz-name" id="bizName"></div>
    <div class="biz-meta" id="bizMeta"></div>
  </div>

  <!-- DESCRIPTION -->
  <div class="section" id="descSection" style="display:none">
    <div class="section-title">📖 על העסק</div>
    <div class="desc-text" id="bizDesc"></div>
  </div>

  <!-- GALLERY -->
  <div class="section" id="gallerySection" style="display:none">
    <div class="section-title">🖼️ תמונות</div>
    <div class="gallery" id="gallery"></div>
  </div>

  <!-- BENEFIT -->
  <div class="section" id="benefitSection" style="display:none">
    <div class="section-title">💛 הטבה לחברים</div>
    <div class="benefit-box">
      <div class="benefit-label">💛 ההטבה שלך</div>
      <div class="benefit-text" id="benefitText"></div>
      <div class="benefit-type" id="benefitType"></div>
    </div>
    <div id="redemptionArea"></div>
    <div class="clicks-info" id="clicksInfo"></div>
  </div>

  <!-- INFO (שעות, סניפים, קישורים) -->
  <div class="section" id="infoSection" style="display:none">
    <div class="section-title">📋 פרטים נוספים</div>
    <div class="info-rows" id="infoRows"></div>
  </div>

</div>

<!-- BOTTOM CTA -->
<div class="bottom-cta" id="bottomCta" style="display:none">
  <button class="cta-call" id="callBtn" style="display:none">📞 התקשר</button>
  <button class="cta-whatsapp" id="waBtn">💬 WhatsApp</button>
</div>

<script type="module">
import { db } from './firebase-config.js';
import { doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const catColors = {
  food:   ['#FF6B35','#E85D04'],
  pro:    ['#2563EB','#1D4ED8'],
  fashion:['#7C3AED','#6D28D9'],
  health: ['#059669','#047857'],
  finance:['#0284C7','#0369A1'],
  tech:   ['#0891B2','#0E7490'],
  legal:  ['#64748B','#475569'],
  sport:  ['#16a34a','#15803d'],
  other:  ['#6b7280','#4b5563'],
};

const catLabels = {
  food:'אוכל ושתייה', pro:'בעלי מקצוע', fashion:'ביגוד ואופנה',
  health:'בריאות ויופי', finance:'פיננסים', tech:'טכנולוגיה',
  legal:'משפטים', sport:'ספורט ופנאי', other:'אחר',
};

function initials(name) {
  const w = name.replace(/[–-]/g,' ').trim().split(/\s+/);
  return w.length === 1 ? w[0].slice(0,2) : w[0][0] + w[1][0];
}

function hide(id) { const el = document.getElementById(id); if (el) el.style.display = 'none'; }
function show(id, d='block') { const el = document.getElementById(id); if (el) el.style.display = d; }

// קבל doc ID מה-URL
const params = new URLSearchParams(location.search);
const bizId  = params.get('id');

if (!bizId) {
  hide('loadingOverlay');
  show('notFound');
} else {
  try {
    const snap = await getDoc(doc(db, 'businesses', bizId));

    if (!snap.exists() || snap.data().status !== 'approved') {
      hide('loadingOverlay');
      show('notFound');
    } else {
      const raw      = snap.data();
      const types    = raw.discountTypes || [];
      const bizTypes = raw.bizTypes || [];

      const b = {
        id:           snap.id,
        name:         raw.name || '',
        cat:          raw.categoryPrimary || 'other',
        city:         (raw.branches && raw.branches[0]?.city) || (bizTypes.includes('online') ? 'אונליין' : ''),
        discount:     raw.discountText || '',
        discountType: types.includes('online') ? 'online' : (types.includes('physical') ? 'physical' : ''),
        coupon:       raw.discountCode || '',
        clicks:       raw.clicks || 0,
        online:       bizTypes.includes('online'),
        isPro:        bizTypes.includes('pro'),
        regions:      raw.regions || [],
        phone:        raw.bizPhone || raw.ownerPhone || raw.phone || '',
        whatsapp:     raw.whatsapp || '',
        serviceEmail: raw.serviceEmail || '',
        desc:         raw.desc || raw.description || '',
        logo:         raw.logo || '',
        photos:       raw.photos || [],
        branches:     raw.branches || [],
        hours:        raw.hours || '',
        website:      raw.website || raw.websiteOnline || '',
        instagram:    raw.instagram || '',
        facebook:     raw.facebook || '',
      };

      // ספירת צפייה
      const clickKey = '_hb_clicks_' + b.id;
      const clicks   = parseInt(localStorage.getItem(clickKey) || b.clicks) + 1;
      localStorage.setItem(clickKey, clicks);
      updateDoc(doc(db, 'businesses', b.id), { clicks: increment(1) }).catch(()=>{});

      // כותרת
      document.title = b.name + ' – הבית הצהוב';

      // HERO
      const heroLogo = document.getElementById('heroLogo');
      if (b.logo) {
        const img = document.createElement('img');
        img.src = b.logo; img.alt = b.name;
        heroLogo.appendChild(img);
      } else {
        const colors = catColors[b.cat] || ['#003DA5','#002a75'];
        heroLogo.textContent = initials(b.name);
        heroLogo.style.background = `linear-gradient(135deg,${colors[0]},${colors[1]})`;
      }

      // Meta
      document.getElementById('bizName').textContent = b.name;
      document.getElementById('bizMeta').innerHTML = [
        `<span class="meta-tag cat">${catLabels[b.cat] || b.cat}</span>`,
        b.online ? '<span class="meta-tag online">🌐 אונליין</span>' : '',
        b.city ? `<span class="meta-tag city">📍 ${b.city}</span>` : '',
        `<span class="meta-tag views">🔥 ${clicks} צפיות</span>`,
      ].filter(Boolean).join('');

      // תיאור
      if (b.desc) {
        show('descSection');
        document.getElementById('bizDesc').textContent = b.desc;
      }

      // גלריה
      const photoUrls = b.photos
        .map(p => (typeof p === 'string') ? p : p?.url)
        .filter(Boolean);
      if (photoUrls.length) {
        show('gallerySection');
        document.getElementById('gallery').innerHTML = photoUrls
          .map(u => `<img src="${u}" loading="lazy" onclick="window.open('${u}','_blank')"/>`)
          .join('');
      }

      // הטבה
      if (b.discount) {
        show('benefitSection');
        document.getElementById('benefitText').textContent = b.discount;

        const typeLabel = b.discountType === 'online'
          ? '🌐 מימוש באתר האינטרנט'
          : b.discountType === 'physical'
            ? '🏪 מימוש בחנות הפיזית'
            : '';
        document.getElementById('benefitType').textContent = typeLabel;
        document.getElementById('clicksInfo').textContent  = `${clicks} חברים צפו בהטבה זו`;

        const area = document.getElementById('redemptionArea');
        if (b.discountType === 'online' && b.coupon) {
          area.innerHTML = `
            <div class="coupon-box" style="margin-top:14px">
              <div class="coupon-lbl">קוד הקופון שלך</div>
              <div class="coupon-code">${b.coupon}</div>
              <button class="copy-btn" id="copyBtn" onclick="copyCoupon('${b.coupon}')">📋 העתק קוד</button>
            </div>`;
        } else if (b.discountType === 'physical') {
          area.innerHTML = `
            <div class="physical-box">
              <div style="font-size:32px">🎟️</div>
              <h4>הצג את התעודה שלך</h4>
              <p>הצג את תעודת החבר הדיגיטלית שלך בחנות וקבל את ההטבה.</p>
              <a href="profile.html">פתח תעודת חבר 🎟️</a>
            </div>`;
        }
      }

      // שורות מידע
      const rows = [];

      if (b.hours) {
        rows.push(`
          <div class="info-row">
            <span class="info-icon">🕐</span>
            <div class="info-body">
              <div class="info-lbl">שעות פעילות</div>
              ${b.hours.replace(/\n/g,'<br>')}
            </div>
          </div>`);
      }

      const validBranches = b.branches.filter(br => br.city || br.address);
      if (validBranches.length) {
        const items = validBranches.map(br => {
          const full    = [br.address, br.city].filter(Boolean).join(', ');
          const wazeUrl = `https://waze.com/ul?q=${encodeURIComponent(full)}`;
          const mapsUrl = `https://maps.google.com/?q=${encodeURIComponent(full)}`;
          return `<div class="branch-item">📍 ${full}
            <a href="${wazeUrl}" target="_blank">Waze</a> ·
            <a href="${mapsUrl}" target="_blank">מפות</a>
          </div>`;
        }).join('');
        rows.push(`
          <div class="info-row">
            <span class="info-icon">🏪</span>
            <div class="info-body">
              <div class="info-lbl">${validBranches.length > 1 ? 'סניפים' : 'כתובת'}</div>
              ${items}
            </div>
          </div>`);
      }

      if (b.isPro && b.regions.length) {
        rows.push(`
          <div class="info-row">
            <span class="info-icon">🗺️</span>
            <div class="info-body">
              <div class="info-lbl">אזורי פעילות</div>
              ${b.regions.join(' · ')}
            </div>
          </div>`);
      }

      if (b.serviceEmail) {
        rows.push(`
          <div class="info-row">
            <span class="info-icon">✉️</span>
            <div class="info-body">
              <div class="info-lbl">מייל שירות</div>
              <a href="mailto:${b.serviceEmail}">${b.serviceEmail}</a>
            </div>
          </div>`);
      }

      const links = [];
      if (b.phone) links.push(`<a href="tel:${b.phone}">📞 ${b.phone}</a>`);
      if (b.website) {
        const url = b.website.startsWith('http') ? b.website : 'https://' + b.website;
        links.push(`<a href="${url}" target="_blank">🌐 אתר</a>`);
      }
      if (b.instagram) {
        const h = b.instagram.trim().replace(/^@/,'');
        const url = h.startsWith('http') ? h : `https://instagram.com/${h}`;
        links.push(`<a href="${url}" target="_blank">📸 אינסטגרם</a>`);
      }
      if (b.facebook) {
        const url = b.facebook.startsWith('http') ? b.facebook : 'https://' + b.facebook;
        links.push(`<a href="${url}" target="_blank">👤 פייסבוק</a>`);
      }
      if (links.length) {
        rows.push(`
          <div class="info-row">
            <span class="info-icon">🔗</span>
            <div class="info-body">
              <div class="info-lbl">קשר ורשתות</div>
              <div class="links-row">${links.join('')}</div>
            </div>
          </div>`);
      }

      if (rows.length) {
        show('infoSection');
        document.getElementById('infoRows').innerHTML = rows.join('');
      }

      // Bottom CTA
      const ctaPhone = b.phone;
      const ctaWa    = b.whatsapp || b.phone;
      if (ctaPhone || ctaWa) {
        show('bottomCta', 'flex');
        if (ctaPhone) {
          show('callBtn', 'flex');
          document.getElementById('callBtn').onclick = () => location.href = 'tel:' + ctaPhone;
        }
        const waPh   = ctaWa.replace(/\D/g,'');
        const waIntl = waPh.startsWith('0') ? '972'+waPh.slice(1) : waPh;
        document.getElementById('waBtn').onclick = () =>
          window.open(`https://wa.me/${waIntl}?text=${encodeURIComponent('היי, ראיתי את העסק שלך בהבית הצהוב 💛')}`, '_blank');
      }

      // כפתור שיתוף
      document.getElementById('shareBtn').onclick = () => {
        if (navigator.share) {
          navigator.share({ title: b.name + ' – הבית הצהוב', url: location.href }).catch(()=>{});
        } else {
          navigator.clipboard?.writeText(location.href).then(()=>alert('הקישור הועתק!'));
        }
      };

      hide('loadingOverlay');
      show('heroSection');
      show('pageContent');
    }
  } catch(e) {
    console.error('Firebase error:', e);
    hide('loadingOverlay');
    show('notFound');
  }
}

window.copyCoupon = function(code) {
  navigator.clipboard?.writeText(code).catch(()=>{});
  const btn = document.getElementById('copyBtn');
  btn.textContent = '✓ הועתק!';
  btn.classList.add('copied');
  setTimeout(()=>{ btn.textContent='📋 העתק קוד'; btn.classList.remove('copied'); }, 2000);
};
</script>
</body>
</html>
