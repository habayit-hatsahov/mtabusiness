<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>דמו — עיגון מיקומים בסקשנים וקטגוריות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #151C2E;
  --nav-bg: #0f1524;
  --card-bg: #1a2440;
  --card-bg2: #1e2b47;
  --yellow: #FFDE00;
  --yellow-dark: #D4B800;
  --blue: #003DA5;
  --blue-dark: #002a75;
  --text: #fff;
  --text-sm: rgba(255,255,255,.55);
  --text-muted: rgba(255,255,255,.32);
  --green: #25D366;
  --orange: #d97706;
  --red: #ff5c5c;
  --border: rgba(255,255,255,.08);
  --border-md: rgba(255,255,255,.14);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 60px;
}

/* ── header ── */
.demo-header {
  background: var(--nav-bg);
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
}
.demo-header h1 { font-size: 17px; font-weight: 800; color: var(--yellow); }
.demo-header p { font-size: 12px; color: var(--text-sm); margin-top: 3px; }
.demo-badge {
  display: inline-block; margin-top: 8px; font-size: 11px; font-weight: 700;
  background: rgba(255,222,0,.12); color: var(--yellow); border: 1px solid rgba(255,222,0,.3);
  padding: 3px 10px; border-radius: 20px;
}

/* ── layout: sidebar + main (כמו פאנל ניהול) ── */
.dash-layout { max-width: 1600px; margin: 0 auto; padding: 20px 24px 0; display: flex; align-items: flex-start; gap: 18px; }
.sidebar {
  width: 208px; flex-shrink: 0; position: sticky; top: 88px;
  background: var(--card-bg2); border: 1px solid var(--border-md); border-radius: 14px; padding: 14px 10px;
}
/* פריט עצמאי בראש הסיידבר (כל העסקים) — לא נעלם, לא תלוי בקבוצות שמתחתיו */
.sidebar-standalone {
  display: flex; align-items: center; gap: 9px; padding: 11px 11px; border-radius: 10px;
  cursor: pointer; margin-bottom: 12px; border: 1.5px solid var(--border-md); transition: all .12s;
  font-size: 12.5px; font-weight: 800; color: var(--text-sm);
}
.sidebar-standalone:hover { border-color: var(--yellow); color: var(--text); }
.sidebar-standalone.active { border-color: var(--yellow); background: rgba(255,222,0,.1); color: var(--yellow); }
.sidebar-standalone .ic { font-size: 16px; }
.sidebar-divider { height: 1px; background: var(--border); margin: 2px 0 12px; }
/* קבוצות (סקשנים/קטגוריות) — הכותרת תמיד גלויה, נפתחת/נסגרת במקום, לא מוחקת כלום אחר */
.sidebar-group-header {
  display: flex; align-items: center; justify-content: space-between; padding: 9px 9px; border-radius: 9px;
  font-size: 11.5px; font-weight: 800; color: var(--text-sm); cursor: pointer; margin-bottom: 3px; transition: all .12s;
}
.sidebar-group-header:hover { background: rgba(255,255,255,.04); color: var(--text); }
.sidebar-group-header .chev { font-size: 9px; color: var(--text-muted); transition: transform .15s; }
.sidebar-group-header.open .chev { transform: rotate(180deg); }
.sidebar-group-body { margin: 0 0 10px 0; }
.sidebar-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 9px 8px 9px; border-radius: 9px;
  font-size: 12.5px; font-weight: 700; color: var(--text-sm); cursor: pointer; margin-bottom: 2px; transition: all .12s;
}
.sidebar-item:hover { background: rgba(255,255,255,.05); color: var(--text); }
.sidebar-item.active { background: rgba(255,222,0,.13); color: var(--yellow); }
.main-content { flex: 1; min-width: 0; }
@media (max-width: 720px) {
  .dash-layout { flex-direction: column; }
  .sidebar { width: 100%; position: static; }
}

/* ── הסבר כללי + מילון מונחים — מקופל כברירת מחדל ── */
.info-accordion { background: var(--card-bg2); border: 1px solid var(--border-md); border-radius: 12px; margin-bottom: 16px; overflow: hidden; }
.info-accordion-header {
  display: flex; align-items: center; justify-content: space-between; padding: 12px 16px;
  cursor: pointer; font-size: 12.5px; font-weight: 800; color: var(--text-sm);
}
.info-accordion-header:hover { color: var(--text); }
.info-accordion-header .chev { font-size: 11px; color: var(--text-muted); transition: transform .15s; }
.info-accordion.open .chev { transform: rotate(180deg); }
.info-accordion-body { display: none; padding: 0 16px 16px; }
.info-accordion.open .info-accordion-body { display: block; }
.info-explainer { font-size: 12.5px; line-height: 1.9; color: var(--text-sm); margin-bottom: 14px; }
.info-explainer b { color: var(--text); }
.info-explainer .yl { color: var(--yellow); }
.glossary-title { font-size: 11.5px; font-weight: 800; color: var(--text-muted); margin-bottom: 10px; }
.glossary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; }
.glossary-item { font-size: 11.5px; line-height: 1.6; }
.glossary-item .term { color: var(--yellow); font-weight: 800; }
.glossary-item .def { color: var(--text-sm); }
@media (max-width: 480px) { .glossary-grid { grid-template-columns: 1fr; } }

.placeholder-note {
  background: var(--card-bg2); border: 1px dashed var(--border-md); border-radius: 12px;
  padding: 40px 16px; text-align: center; color: var(--text-muted); font-size: 13px;
}

/* ── כל העסקים: כרטיסי סטטיסטיקה + פילטר + בחירה מרובה + רשימת שורות קומפקטית ── */
/* 3 כרטיסי מידע בלבד — בדיוק כמו ב-admin-businesses.html היום (עסקים נרשמו/ממתינים לאישור/עסקים פעילים).
   אלה תצוגת מידע, לא כפתורי סינון — הסינון בפועל הוא שורת filter-btn נפרדת למטה, בדיוק כמו במקור. */
.biz-stats-row { display: flex; gap: 10px; margin-bottom: 18px; }
.biz-stat-card {
  flex: 1; background: var(--card-bg2); border: 1px solid var(--border-md); border-radius: 12px;
  padding: 14px 16px; text-align: center;
}
.biz-stat-card .num { font-size: 26px; font-weight: 900; color: var(--yellow); }
.biz-stat-card.pending .num { color: var(--orange); }
.biz-stat-card.approved .num { color: var(--green); }
.biz-stat-card .lbl { font-size: 11.5px; color: var(--text-sm); margin-top: 3px; font-weight: 700; }

/* שורת סינון — 5 כפתורים + חיפוש, בדיוק כמו filter-bar במקור */
.biz-filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.biz-filter-btn {
  padding: 7px 15px; border-radius: 20px; border: 1.5px solid var(--border-md); background: var(--card-bg2);
  font-family: 'Heebo', sans-serif; font-size: 12.5px; font-weight: 700; color: var(--text-sm); cursor: pointer; transition: all .15s; white-space: nowrap;
}
.biz-filter-btn.active { background: rgba(255,222,0,.15); border-color: var(--yellow); color: var(--yellow); }
.biz-filter-btn.changes { border-color: rgba(217,119,6,.4); color: #fbbf24; background: rgba(217,119,6,.15); }
.biz-filter-btn.changes.active { background: #d97706; border-color: #d97706; color: #1a1a1a; }
.biz-changes-badge {
  display: inline-flex; align-items: center; justify-content: center; background: #d97706; color: #fff;
  font-size: 10.5px; font-weight: 800; min-width: 17px; height: 17px; border-radius: 9px; padding: 0 4px; margin-right: 3px;
}
.biz-filter-btn.changes.active .biz-changes-badge { background: #1a1a1a; color: #fbbf24; }
.biz-search {
  flex: 1; min-width: 180px; padding: 7px 14px; border-radius: 20px; border: 1.5px solid var(--border-md);
  background: var(--nav-bg); color: var(--text); font-family: 'Heebo', sans-serif; font-size: 13px;
}
.biz-search:focus { border-color: var(--yellow); outline: none; }

.biz-select-all-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.biz-select-all-btn {
  flex-shrink: 0; border: 1.5px solid var(--border-md); background: var(--card-bg2); color: var(--text-sm);
  font-family: 'Heebo', sans-serif; font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 20px; cursor: pointer; white-space: nowrap;
}
.biz-select-all-btn.active { background: rgba(255,222,0,.15); border-color: var(--yellow); color: var(--yellow); }
.biz-sel-count { font-size: 11.5px; color: var(--text-muted); }

.biz-bulk-bar {
  display: flex; align-items: center; gap: 10px; background: rgba(255,222,0,.08); border: 1px solid rgba(255,222,0,.3);
  border-radius: 10px; padding: 9px 13px; margin-bottom: 12px; font-size: 12.5px; font-weight: 700; color: var(--yellow);
}
.biz-bulk-bar .sp { flex: 1; }
.biz-bulk-btn {
  border: none; font-family: 'Heebo', sans-serif; font-size: 11.5px; font-weight: 800; padding: 6px 12px;
  border-radius: 8px; cursor: pointer;
}
.biz-bulk-btn.approve { background: var(--green); color: #0f1524; }
.biz-bulk-btn.reject { background: var(--red); color: #fff; }
.biz-bulk-btn.cancel { background: transparent; border: 1.5px solid var(--border-md); color: var(--text-sm); }

/* שורת עסק — בדיוק תואמת ל-biz-card של admin-businesses.html: מסגרת ימין צבעונית לפי סטטוס,
   אווטאר גנרי, שם + תג "✏️ שינויים", שורת meta (סוג+עיר), צ'יפ סטטוס, שברון פתיחה */
.biz-list { border: 1px solid var(--border-md); border-radius: 10px; overflow: hidden; }
.biz-row {
  background: var(--card-bg); border-bottom: 1px solid var(--border); border-right: 3px solid transparent;
  padding: 9px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background .12s;
}
.biz-row:last-child { border-bottom: none; }
.biz-row:hover { background: rgba(255,255,255,.03); }
.biz-row.pending  { border-right-color: var(--orange); }
.biz-row.approved { border-right-color: var(--green); }
.biz-row.rejected { border-right-color: var(--border-md); opacity: .6; }
.biz-row.selected { background: rgba(255,222,0,.06); }
.biz-row-checkbox {
  flex-shrink: 0; width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid var(--border-md);
  cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--yellow);
}
.biz-row.selected .biz-row-checkbox { border-color: var(--yellow); background: rgba(255,222,0,.15); }
.biz-row-icon {
  flex-shrink: 0; width: 28px; height: 28px; border-radius: 8px; background: var(--card-bg2);
  display: flex; align-items: center; justify-content: center; font-size: 15px;
}
.biz-row-main { flex: 1; min-width: 0; display: flex; align-items: baseline; gap: 10px; }
.biz-row-name { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; }
.biz-row-meta { font-size: 11.5px; color: var(--text-sm); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.biz-change-badge {
  font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 9px; white-space: nowrap; flex-shrink: 0;
  color: var(--yellow); background: rgba(255,222,0,.13); border: 1px solid rgba(255,222,0,.3);
}
.biz-status-badge { font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
.biz-status-badge.approved { color: #86efac; background: rgba(37,211,102,.18); }
.biz-status-badge.pending  { color: #fbbf24; background: rgba(217,119,6,.18); }
.biz-status-badge.rejected { color: var(--text-sm); background: rgba(255,255,255,.08); }
.biz-row-chevron { flex-shrink: 0; color: var(--text-muted); font-size: 15px; }

/* ── active-tab info panel ── */
.tab-info {
  background: rgba(255,222,0,.05); border: 1px solid rgba(255,222,0,.2); border-radius: 12px;
  padding: 12px 14px; margin-bottom: 14px; font-size: 12px; line-height: 1.75;
}
.tab-info .ti-title { font-weight: 800; color: var(--yellow); font-size: 12.5px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.tab-info .ti-type { font-size: 10px; font-weight: 700; color: var(--text-muted); background: rgba(255,255,255,.06); padding: 1px 8px; border-radius: 10px; }
.tab-info .ti-body { color: var(--text-sm); }
.tab-info .ti-body b { color: var(--text); }

/* ── expiring-soon panel ── */
.expiring-panel {
  background: var(--card-bg2); border: 1px solid var(--border-md); border-radius: 12px;
  padding: 12px 14px; margin-bottom: 18px;
}
.expiring-title { font-size: 12px; font-weight: 800; color: var(--text-sm); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.expiring-empty { font-size: 11.5px; color: var(--text-muted); }
.expiring-subgroup { margin-bottom: 14px; }
.expiring-subgroup:last-child { margin-bottom: 0; }
.exp-sub-title { font-size: 10.5px; font-weight: 800; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
.exp-sub-title.warn { color: var(--orange); }
.exp-sub-title.ok-title { color: var(--green); }
.exp-sub-list { background: var(--nav-bg); border-radius: 10px; overflow: hidden; }
.expiring-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-top: 1px solid var(--border); }
.expiring-item:first-child { border-top: none; }
.exp-pos {
  flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%; background: var(--card-bg);
  border: 1px solid var(--border-md); font-size: 9.5px; font-weight: 900; color: var(--text-sm);
  display: flex; align-items: center; justify-content: center;
}
.exp-body { flex: 1; min-width: 0; font-size: 12px; font-weight: 700; }
.exp-body .succ { font-weight: 400; color: var(--text-sm); }
.exp-body .succ .cv { color: var(--yellow); font-weight: 700; }
.exp-days { font-size: 10.5px; font-weight: 800; padding: 2px 8px; border-radius: 10px; white-space: nowrap; }
.exp-days.urgent { color: var(--red); background: rgba(255,92,92,.12); }
.exp-days.soon { color: var(--orange); background: rgba(217,119,6,.15); }
.exp-days.ok { color: var(--text-sm); background: rgba(255,255,255,.06); }
.exp-action-btn {
  flex-shrink: 0; border: 1.5px solid var(--border-md); background: transparent; color: var(--yellow);
  font-family: 'Heebo', sans-serif; font-size: 10.5px; font-weight: 700; padding: 5px 9px; border-radius: 8px; cursor: pointer;
}
.exp-action-btn:hover { border-color: var(--yellow); }

/* ── preview strip ── */
.preview-label { font-size: 12px; font-weight: 800; color: var(--text-sm); margin-bottom: 10px; }
.preview-strip { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 14px; margin-bottom: 22px; -webkit-overflow-scrolling: touch; }
.preview-strip::-webkit-scrollbar { display: none; }
.pv-card {
  flex-shrink: 0; width: 96px; background: var(--card-bg); border: 1.5px solid var(--border-md);
  border-radius: 12px; padding: 10px 8px; text-align: center; position: relative;
}
.pv-card.pinned { border-color: var(--yellow); box-shadow: 0 0 0 1px rgba(255,222,0,.25); }
.pv-pos {
  position: absolute; top: -8px; right: -8px; width: 20px; height: 20px; border-radius: 50%;
  background: var(--nav-bg); border: 1.5px solid var(--border-md); color: var(--text-sm);
  font-size: 10px; font-weight: 900; display: flex; align-items: center; justify-content: center;
}
.pv-card.pinned .pv-pos { background: var(--yellow); color: var(--blue-dark); border-color: var(--yellow); }
.pv-icon { font-size: 22px; margin-bottom: 4px; }
.pv-name { font-size: 10.5px; font-weight: 700; line-height: 1.3; }
.pv-pin-mark { font-size: 9px; color: var(--yellow); font-weight: 800; margin-top: 3px; }
.pv-auto-mark { font-size: 9px; color: var(--text-muted); margin-top: 3px; }
.pv-empty-note { font-size: 12px; color: var(--text-muted); padding: 10px 0; }

/* ── slots table ── */
.slots { display: flex; flex-direction: column; gap: 8px; }
.slot {
  background: var(--card-bg); border: 1.5px solid var(--border-md); border-radius: 12px;
  padding: 10px 12px; display: flex; align-items: center; gap: 12px;
}
.slot.anchored { border-color: rgba(255,222,0,.35); background: linear-gradient(90deg, rgba(255,222,0,.06), var(--card-bg) 40%); }
.slot-num {
  flex-shrink: 0; width: 30px; height: 30px; border-radius: 50%; background: var(--nav-bg);
  border: 1.5px solid var(--border-md); display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 900; color: var(--text-sm);
}
.slot.anchored .slot-num { background: var(--yellow); color: var(--blue-dark); border-color: var(--yellow); }
.slot-body { flex: 1; min-width: 0; }
.slot-empty-txt { font-size: 12.5px; color: var(--text-muted); }
.slot-biz-name { font-size: 13.5px; font-weight: 800; display: flex; align-items: center; gap: 6px; }
.slot-meta { font-size: 11px; color: var(--text-sm); margin-top: 3px; display: flex; flex-wrap: wrap; gap: 4px 10px; }
.slot-meta .fixed-tag { color: var(--green); font-weight: 700; }
.slot-meta .temp-tag { color: var(--orange); font-weight: 700; }
.chain-line { font-size: 10.5px; color: var(--text-sm); margin-top: 4px; }
.chain-line .cv { color: var(--yellow); font-weight: 700; }
.slot-actions { flex-shrink: 0; display: flex; flex-direction: column; gap: 6px; }
.slot-btn {
  border: 1.5px solid var(--border-md); background: transparent; color: var(--text-sm);
  font-family: 'Heebo', sans-serif; font-size: 11.5px; font-weight: 700; padding: 6px 11px;
  border-radius: 8px; cursor: pointer; white-space: nowrap; transition: all .15s;
}
.slot-btn:hover { border-color: var(--yellow); color: var(--yellow); }
.slot-btn.danger:hover { border-color: var(--red); color: var(--red); }
.slot-btn.primary { background: var(--yellow); color: var(--blue-dark); border-color: var(--yellow); }
.slot-btn.primary:hover { opacity: .88; color: var(--blue-dark); }
.slot-btn[disabled] { opacity: .4; cursor: not-allowed; }
.slot-btn[disabled]:hover { border-color: var(--border-md); color: var(--text-sm); }

/* ── picker panel (inline, replaces slot body when picking) ── */
.picker { background: var(--nav-bg); border-radius: 10px; padding: 10px; margin-top: 8px; }
.picker input[type="search"] {
  width: 100%; padding: 8px 10px; border-radius: 8px; border: 1.5px solid var(--border-md);
  background: var(--card-bg); color: var(--text); font-family: 'Heebo', sans-serif; font-size: 12.5px; margin-bottom: 8px;
}
.picker-scope-note { font-size: 10.5px; color: var(--text-muted); margin-bottom: 8px; }
.picker-list { max-height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
.picker-item {
  display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 8px;
  cursor: pointer; font-size: 12.5px; transition: background .12s;
}
.picker-item:hover { background: rgba(255,222,0,.08); }
.picker-item .ic { font-size: 15px; }
.picker-item .nm { font-weight: 700; }
.picker-empty { font-size: 12px; color: var(--text-muted); padding: 10px; text-align: center; }

/* ── mode form (after choosing a business) ── */
.mode-form { background: var(--nav-bg); border-radius: 10px; padding: 12px; margin-top: 8px; }
.mode-form .chosen { font-size: 13px; font-weight: 800; margin-bottom: 10px; display: flex; align-items: center; gap: 7px; }
.mode-toggle { display: flex; gap: 8px; margin-bottom: 10px; }
.mode-opt {
  flex: 1; text-align: center; padding: 8px; border-radius: 8px; border: 1.5px solid var(--border-md);
  cursor: pointer; font-size: 12px; font-weight: 700; color: var(--text-sm);
}
.mode-opt.selected { border-color: var(--yellow); background: rgba(255,222,0,.1); color: var(--yellow); }
.days-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.days-row input {
  width: 70px; padding: 7px 9px; border-radius: 8px; border: 1.5px solid var(--border-md);
  background: var(--card-bg); color: var(--text); font-family: 'Heebo', sans-serif; font-size: 13px;
}
.days-row span { font-size: 11.5px; color: var(--text-sm); }
.mode-actions { display: flex; gap: 8px; }

.chain-block { background: var(--card-bg); border: 1px dashed var(--border-md); border-radius: 10px; padding: 10px; margin-bottom: 10px; }
.chain-label { font-size: 11.5px; font-weight: 800; color: var(--text-sm); margin-bottom: 8px; }
.chain-select {
  width: 100%; padding: 8px 9px; border-radius: 8px; border: 1.5px solid var(--border-md);
  background: var(--nav-bg); color: var(--text); font-family: 'Heebo', sans-serif; font-size: 12.5px; margin-bottom: 8px;
}
.chain-sub-toggle { display: flex; gap: 8px; margin-top: 8px; }

const SLOT_COUNT = 10;

// state[tabKey][slotIndex] = null (=אוטומטי) או
// { bizId, mode:'fixed'|'temp', days, setAt:Date, until:Date|null,
//   next:null|{bizId,mode,days,handoverAt:Date} }

function bizById(id) { return MOCK_BUSINESSES.find(b => b.id === id); }

// מאגר העסקים הרלוונטי לטאב: קטגוריה = רק עסקים ששייכים אליה בפועל. סקשן = הכל, אלא אם יש ELIGIBLE_FILTER.
function poolFor(tab) {
  if (tab.type === 'category') return MOCK_BUSINESSES.filter(b => b.catKey === tab.catKey);
  const ef = ELIGIBLE_FILTER[tab.key];
  return ef ? MOCK_BUSINESSES.filter(ef.test) : MOCK_BUSINESSES;
}
function scopeNoteFor(tab) {
  if (tab.type === 'category') return `מציג רק עסקים ששייכים בפועל לקטגוריית "${CATEGORIES.find(c=>c.key===tab.catKey).label}"`;
  const ef = ELIGIBLE_FILTER[tab.key];
  return ef ? ef.note : 'מציג את כל העסקים המאושרים באינדקס';
}

// סדר "אוטומטי" יציב לכל טאב, לצורך התצוגה המקדימה בלבד (מדמה את הסבב היומי ההוגן האמיתי)
function autoOrderFor(tab) {
  const seed = [...tab.key].reduce((a,c) => a + c.charCodeAt(0), 0);
  return [...poolFor(tab)].sort((a, b) => {
    const ha = (a.id.charCodeAt(1) * 31 + seed) % 97;
    const hb = (b.id.charCodeAt(1) * 31 + seed) % 97;
    return ha - hb;
  });
}

function fmtDateTime(d) {
  if (!d) return '';
  return d.toLocaleDateString('he-IL') + ' ' + d.toLocaleTimeString('he-IL', {hour:'2-digit',minute:'2-digit'});
}
function fmtDate(d) { return d.toLocaleDateString('he-IL'); }
function daysLeft(date) { return Math.ceil((date - new Date()) / DAY_MS); }
function isExpired(anchor) { return anchor.mode === 'temp' && anchor.until && new Date() > anchor.until; }
// התאריך שבו קורה משהו למיקום הזה: לעיגון זמני זה מועד הפקיעה. לעיגון קבוע זה תאריך ההחלפה
// המתוזמן (אם הוגדר) — קבוע בלי מחליף לא "מסתיים" אף פעם, ולכן לא מוצג בפאנל.
function effectiveDate(anchor) {
  return anchor.mode === 'temp' ? anchor.until : (anchor.next ? anchor.next.handoverAt : null);
}

// ── סיידבר קבוע: "כל העסקים" תמיד למעלה, ואז שתי קבוצות (סקשנים/קטגוריות) שנשארות גלויות —
// לוחצים על כותרת קבוצה כדי לפתוח/לסגור אותה, בלי לאבד את המקום או "לחזור" למסך ריק.
// רק קבוצה אחת פתוחה בו-זמנית (כדי לא להציג 13 פריטים ביחד) — אבל שתי הכותרות תמיד שם.
function sidebarGroupHtml(mode, title, list) {
  const open = openGroup === mode;
  const items = open ? list.map(t => `
    <div class="sidebar-item ${t.key===activeTab?'active':''}" onclick="selectTab('${t.key}')">${t.label}</div>`).join('') : '';
  return `
    <div class="sidebar-group-header ${open?'open':''}" onclick="toggleGroup('${mode}')">
      <span>${title}</span><span class="chev">▾</span>
    </div>
    ${open ? `<div class="sidebar-group-body">${items}</div>` : ''}`;
}

function expiringPanelHtml() {
  const slots = state[activeTab];

    .map((a, i) => ({ a, i, ed: a ? effectiveDate(a) : null }))

  if (!items.length) {

      </div>`;
  }

  const needsAttention = items.filter(x => !x.a.next);
  const covered        = items.filter(x => x.a.next);

  const rowNeedsAttention = ({a, i, ed}) => {
    const biz = bizById(a.bizId);
    return `
      <div class="expiring-item">
        <div class="exp-pos">${i+1}</div>
        <div class="exp-body">${biz.icon} ${biz.name}</div>
        ${expDaysBadge(daysLeft(ed))}
        <button class="exp-action-btn" onclick="editExisting(${i})">📌 קבע מי יחליף</button>
      </div>`;
  };
  const rowCovered = ({a, i, ed}) => {
    const biz = bizById(a.bizId);
    const nx  = bizById(a.next.bizId);
    return `
      <div class="expiring-item">
        <div class="exp-pos">${i+1}</div>
        <div class="exp-body">${biz.icon} ${biz.name} <span class="succ">← <span class="cv">${nx.icon} ${nx.name}</span></span></div>
        ${expDaysBadge(daysLeft(ed))}
        <button class="exp-action-btn" onclick="editExisting(${i})">ערוך</button>
      </div>`;
  };

  const attentionBlock = needsAttention.length ? `
    <div class="expiring-subgroup">
      <div class="exp-sub-title warn">⚠️ ללא מחליף — יחזרו לסבב אוטומטי (${needsAttention.length})</div>
      <div class="exp-sub-list">${needsAttention.map(rowNeedsAttention).join('')}</div>
    </div>` : '';
  const coveredBlock = covered.length ? `
    <div class="expiring-subgroup">
      <div class="exp-sub-title ok-title">✓ כבר מוגדר מי יחליף (${covered.length})</div>
      <div class="exp-sub-list">${covered.map(rowCovered).join('')}</div>
    </div>` : '';

  return `
    <div class="expiring-panel">
      <div class="expiring-title">⏳ מה מסתיים / מתחלף בקרוב</div>
      ${attentionBlock}
      ${coveredBlock}
    </div>`;
}

function previewStripHtml(tab) {
  const slots = state[activeTab];
  const anchoredIds = new Set(slots.filter(Boolean).map(a => !isExpired(a) ? a.bizId : null).filter(Boolean));
  const autoPool = autoOrderFor(tab).filter(b => !anchoredIds.has(b.id));
  let autoIdx = 0;

  const cards = slots.map((anchor, i) => {
    if (anchor && !isExpired(anchor)) {
      const biz = bizById(anchor.bizId);
      return `<div class="pv-card pinned"><div class="pv-pos">${i+1}</div>
        <div class="pv-icon">${biz.icon}</div><div class="pv-name">${biz.name}</div>
        <div class="pv-pin-mark">📌 מעוגן</div></div>`;
    }
    const biz = autoPool[autoIdx++] || null;
    if (!biz) return '';
    return `<div class="pv-card"><div class="pv-pos">${i+1}</div>
      <div class="pv-icon">${biz.icon}</div><div class="pv-name">${biz.name}</div>
      <div class="pv-auto-mark">סבב אוטומטי</div></div>`;
  }).join('');

  return cards || `<div class="pv-empty-note">אין עדיין עסקים מתאימים במוק</div>`;
}

function slotsHtml(tab) {
  const slots = state[activeTab];
  const poolSize = poolFor(tab).length;

  return slots.map((anchor, i) => {
    const active = anchor && !isExpired(anchor);
    if (pickingSlot === i) return renderPickerSlot(i, tab);

    if (active) {
      const biz = bizById(anchor.bizId);
      const modeLine = anchor.mode === 'fixed'
        ? `<span class="fixed-tag">📌 קבוע</span>`
        : `<span class="temp-tag">⏳ עד ${fmtDate(anchor.until)}</span>`;
      let chainLine = '';
      if (anchor.next) {
        const when = anchor.mode === 'temp' ? 'לאחר שהעיגון יפוג' : 'ב-' + fmtDate(anchor.next.handoverAt);
        chainLine = `<div class="chain-line">→ ${when}: <span class="cv">${bizById(anchor.next.bizId).icon} ${bizById(anchor.next.bizId).name}</span> (${anchor.next.mode==='fixed' ? 'קבוע' : 'למשך ' + anchor.next.days + ' ימים'})</div>`;
      } else if (anchor.mode === 'temp') {
        chainLine = `<div class="chain-line" style="color:var(--text-muted)">→ לאחר מכן: חוזר לסבב אוטומטי</div>`;
      }
      const scheduleBtn = anchor.mode === 'fixed'
        ? `<button class="slot-btn" onclick="editExisting(${i})">${anchor.next ? 'ערוך תזמון' : '🗓 תזמן החלפה'}</button>`
        : '';
      return `
        <div class="slot anchored">
          <div class="slot-num">${i+1}</div>
          <div class="slot-body">
            <div class="slot-biz-name">${biz.icon} ${biz.name}</div>
            <div class="slot-meta">
              ${modeLine}
              <span>נקבע ב-${fmtDateTime(anchor.setAt)}</span>
            </div>
            ${chainLine}
          </div>
          <div class="slot-actions">
            <button class="slot-btn" onclick="openPicker(${i})">החלף</button>
            ${scheduleBtn}
            <button class="slot-btn danger" onclick="removeAnchor(${i})">הסר</button>
          </div>
        </div>`;
    }

    const disabled = poolSize === 0;
    return `
      <div class="slot">
        <div class="slot-num">${i+1}</div>
        <div class="slot-body"><div class="slot-empty-txt">— אוטומטי, מתחלף יומית —</div></div>
        <div class="slot-actions">
          <button class="slot-btn primary" ${disabled ? 'disabled' : ''} onclick="openPicker(${i})">📌 עגן עסק כאן</button>
        </div>
      </div>`;
  }).join('');
}

function renderPickerSlot(i, tab) {
  if (choosingBiz) return renderModeForm(i, tab);

  return `
    <div class="slot anchored">
      <div class="slot-num">${i+1}</div>
      <div class="slot-body" style="width:100%">
        <div class="picker">
          <input type="search" placeholder="חפש עסק לפי שם..." oninput="filterPicker(this.value)" id="pickerSearch">
          <div class="picker-scope-note">${scopeNoteFor(tab)}</div>
          <div class="picker-list" id="pickerList"></div>
        </div>
        <div class="mode-actions" style="margin-top:8px">
          <button class="slot-btn" onclick="cancelPicker()">ביטול</button>
        </div>
      </div>
    </div>`;
}

// בלוק "מי יחליף" — זמין גם לעיגון זמני (מחליף נכנס כשהתוקף פג) וגם לעיגון קבוע
// (מחליף נכנס בתאריך שבוחרים ידנית, כי לקבוע אין תאריך פקיעה טבעי).
function renderChainBlock(tab, i) {
  const excludeIds = new Set(
    state[activeTab].map((a,idx) => (a && !isExpired(a) && idx !== i) ? a.bizId : null).filter(Boolean)
  );
  excludeIds.add(choosingBiz);
  const successorOptions = poolFor(tab).filter(b => !excludeIds.has(b.id));
  const isTemp = editMode.type === 'temp';

  const offLabel = isTemp ? '🔄 חוזר לסבב אוטומטי' : '♾ יישאר קבוע (בלי תזמון)';
  const onLabel  = isTemp ? '📌 עסק אחר יחליף' : '📌 תזמן מי יחליף ומתי';
  const blockTitle = isTemp ? 'מה קורה כשפג התוקף?' : 'לתזמן כבר עכשיו מי יחליף בעתיד?';

  return `
    <div class="chain-block">
      <div class="chain-label">${blockTitle}</div>
      <div class="mode-toggle">
        <div class="mode-opt ${editMode.chainMode==='auto'?'selected':''}" onclick="setChainMode('auto')">${offLabel}</div>
        <div class="mode-opt ${editMode.chainMode==='chain'?'selected':''}" onclick="setChainMode('chain')">${onLabel}</div>
      </div>
      ${editMode.chainMode === 'chain' ? `
        <select class="chain-select" onchange="editMode.nextBizId=this.value||null; renderAll()">
          <option value="">בחר עסק שיחליף...</option>
          ${successorOptions.map(b => `<option value="${b.id}" ${editMode.nextBizId===b.id?'selected':''}>${b.icon} ${b.name}</option>`).join('')}
        </select>
        ${editMode.nextBizId ? `
          ${!isTemp ? `
            <div class="days-row" style="margin-bottom:8px">
              <input type="number" min="1" value="${editMode.handoverDays}" oninput="editMode.handoverDays=parseInt(this.value)||1; renderAll()">
              <span>ימים מהיום — ההחלפה תקרה ב-${fmtDate(new Date(Date.now()+ (editMode.handoverDays||30)*DAY_MS))}</span>
            </div>` : ''
          }
          <div class="chain-sub-toggle">
            <div class="mode-opt ${editMode.nextType==='fixed'?'selected':''}" onclick="setNextType('fixed')">📌 קבוע</div>
            <div class="mode-opt ${editMode.nextType==='temp'?'selected':''}" onclick="setNextType('temp')">⏳ הוא עצמו לזמן מוגבל</div>
          </div>
          ${editMode.nextType === 'temp' ? `
            <div class="days-row" style="margin-top:8px">
              <input type="number" min="1" value="${editMode.nextDays}" oninput="editMode.nextDays=parseInt(this.value)||1">
              <span>ימים מרגע שהוא נכנס</span>
            </div>` : ''
          }` : ''
        }
      ` : ''}
    </div>`;
}

function renderModeForm(i, tab) {
  const biz = bizById(choosingBiz);

  return `
    <div class="slot anchored">
      <div class="slot-num">${i+1}</div>
      <div class="slot-body" style="width:100%">
        <div class="mode-form">
          <div class="chosen">${biz.icon} ${biz.name} <span style="color:var(--text-muted);font-weight:400;font-size:11px">— בחר קבוע או זמני</span></div>
          <div class="mode-toggle">
            <div class="mode-opt ${editMode.type==='fixed'?'selected':''}" onclick="setEditMode('fixed')">📌 קבוע</div>
            <div class="mode-opt ${editMode.type==='temp'?'selected':''}" onclick="setEditMode('temp')">⏳ לזמן מוגבל</div>
          </div>
          ${editMode.type==='temp' ? `
            <div class="days-row">
              <input type="number" min="1" value="${editMode.days}" oninput="editMode.days=parseInt(this.value)||1; renderAll()">
              <span>ימים מהיום — יפוג ב-${fmtDate(new Date(Date.now()+ (editMode.days||1)*DAY_MS))}</span>
            </div>` : ''
          }
          ${renderChainBlock(tab, i)}
          <div class="mode-actions">
            <button class="slot-btn primary" onclick="saveAnchor(${i})">שמור עיגון</button>
            <button class="slot-btn" onclick="cancelPicker()">ביטול</button>
          </div>
        </div>
      </div>
    </div>`;
}

window.openPicker = function(i) {
  pickingSlot = i;
  choosingBiz = null;
  editMode = { type: 'fixed', days: 30, chainMode: 'auto', nextBizId: null, nextType: 'fixed', nextDays: 30, handoverDays: 30 };
  renderAll();
  setTimeout(() => filterPicker(''), 0);
};

// עריכה מהירה של עיגון קיים (למשל מתוך פאנל "מסתיים בקרוב") — נכנס ישר לטופס המצב, בלי לחפש מחדש
window.editExisting = function(i) {
  pickingSlot = i;
  const a = state[activeTab][i];
  choosingBiz = a.bizId;
  const now = Date.now();
  editMode = {
    type: a.mode, days: a.days || 30,
    chainMode: a.next ? 'chain' : 'auto',
    nextBizId: a.next ? a.next.bizId : null,
    nextType: a.next ? a.next.mode : 'fixed',
    nextDays: (a.next && a.next.days) || 30,
    handoverDays: (a.mode === 'fixed' && a.next) ? Math.max(1, Math.round((a.next.handoverAt - now) / DAY_MS)) : 30,
  };
  renderAll();
};

window.cancelPicker = function() {
  pickingSlot = null;
  choosingBiz = null;
  renderAll();
};

window.filterPicker = function(q) {
  const tab = tabMeta(activeTab);
  const anchoredIdsElsewhere = new Set(
    state[activeTab].map((a,idx) => (a && !isExpired(a) && idx !== pickingSlot) ? a.bizId : null).filter(Boolean)
  );
  const list = poolFor(tab).filter(b =>
    !anchoredIdsElsewhere.has(b.id) &&
    (!q || b.name.includes(q))
  );
  const listEl = document.getElementById('pickerList');
  if (!listEl) return;
  listEl.innerHTML = list.length ? list.map(b => `
    <div class="picker-item" onclick="chooseBiz('${b.id}')">
      <span class="ic">${b.icon}</span><span class="nm">${b.name}</span>
    </div>`).join('') : `<div class="picker-empty">לא נמצאו עסקים מתאימים</div>`;
};

window.chooseBiz = function(id) {
  choosingBiz = id;
  renderAll();
};

window.setEditMode = function(type) {
  editMode.type = type;
  renderAll();
};
window.setChainMode = function(mode) {
  editMode.chainMode = mode;
  renderAll();
};
window.setNextType = function(type) {
  editMode.nextType = type;
  renderAll();
};

window.saveAnchor = function(i) {
  const now = new Date();
  const until = editMode.type === 'temp' ? new Date(now.getTime() + (editMode.days||1) * DAY_MS) : null;

  let next = null;
  if (editMode.chainMode === 'chain' && editMode.nextBizId) {
    const handoverAt = editMode.type === 'temp' ? until : new Date(now.getTime() + (editMode.handoverDays||30) * DAY_MS);
    next = {
      bizId: editMode.nextBizId,
      mode: editMode.nextType,
      days: editMode.nextType === 'temp' ? (editMode.nextDays || 1) : null,
      handoverAt,
    };
  }

  state[activeTab][i] = {
    bizId: choosingBiz,
    mode: editMode.type,
    days: editMode.type === 'temp' ? (editMode.days || 1) : null,
    setAt: now,
    until,
    next,
  };
  pickingSlot = null;
  choosingBiz = null;
  renderAll();
};

window.removeAnchor = function(i) {
  state[activeTab][i] = null;
  renderAll();
};

// שדות שאין ב-admin-businesses.html היום (region/clicks/likes) לא מוצגים בשורה — נשארים במוק
// כי הם רלוונטיים ל"מרכז נתונים" (שם הם כבר קיימים היום, ר' הצעה שנשלחה בצ'אט), לא לרשימה עצמה.
const BIZ_TYPE_LABELS_MOCK = { physical: '🏪 חנות פיזית', online: '🌐 אונליין' };

let bizSearch = '';
let bizStatusFilter = 'all';   // 'all' | 'pending' | 'approved' | 'rejected' | 'changes' — בדיוק כמו filter-bar במקור
let selectedBizIds = new Set();

function bizFilteredList() {
  const q = bizSearch.trim();
  return MOCK_BUSINESSES.filter(b => {
    const matchF = bizStatusFilter === 'all' ? true
      : bizStatusFilter === 'changes' ? !!b.hasPendingChange
      : b.status === bizStatusFilter;
    return matchF && (!q || b.name.includes(q));
  });
}

// תואם ל-statusChip()/waitingChip() ב-admin-businesses.html: מאושר/נדחה מקבלים צ'יפ קבוע,
// ממתין־לאישור מציג "נרשם [תאריך]" (כל העסקים במוק רשומים מעל 24 שעות, כמו במציאות ברוב המקרים)
function bizStatusChipHtml(b) {
  if (b.status === 'approved') return `<span class="biz-status-badge approved">✓ אושר</span>`;
  if (b.status === 'rejected') return `<span class="biz-status-badge rejected">✗ נדחה</span>`;
  return `<span class="biz-status-badge pending">📅 נרשם ${fmtDate(b.registeredAt)}</span>`;
}

function bizMetaStr(b) {
  const typeStr = (b.bizTypes || []).map(t => BIZ_TYPE_LABELS_MOCK[t]).filter(Boolean).join(' · ');
  return [typeStr, b.city].filter(Boolean).join(' · ') || (b.isOnline ? 'אונליין' : '—');
}

function bizRowsHtml() {
  const shown = bizFilteredList();
  const rows = shown.map(b => {
    const changeBadge = b.hasPendingChange ? `<span class="biz-change-badge">✏️ שינויים</span>` : '';
    const sel = selectedBizIds.has(b.id);
    return `
      <div class="biz-row ${b.status} ${sel?'selected':''}">
        <div class="biz-row-checkbox" onclick="event.stopPropagation();toggleBizSelect('${b.id}')">${sel ? '✓' : ''}</div>
        <div class="biz-row-icon">🏪</div>
        <div class="biz-row-main">
          <span class="biz-row-name">${b.name}</span>
          ${changeBadge}
          <span class="biz-row-meta">${bizMetaStr(b)}</span>
        </div>
        ${bizStatusChipHtml(b)}
        <span class="biz-row-chevron">›</span>
      </div>`;
  }).join('');
  return rows || `<div class="pv-empty-note">לא נמצאו עסקים</div>`;
}

function refreshBizList() {
  const el = document.getElementById('bizListRows');
  if (el) el.innerHTML = bizRowsHtml();
  const bar = document.getElementById('bizBulkBarWrap');
  if (bar) bar.outerHTML = bizBulkBarHtml();
  const selRow = document.getElementById('bizSelectAllRow');
  if (selRow) selRow.outerHTML = bizSelectAllRowHtml();
}

window.filterBizRows = function(v) {
  bizSearch = v;
  refreshBizList();
};

window.setBizStatusFilter = function(status) {
  bizStatusFilter = status;
  renderMain();
};

window.toggleBizSelect = function(id) {
  if (selectedBizIds.has(id)) selectedBizIds.delete(id); else selectedBizIds.add(id);
  refreshBizList();
};

window.toggleSelectAllBiz = function() {
  const ids = bizFilteredList().map(b => b.id);
  const allSelected = ids.length > 0 && ids.every(id => selectedBizIds.has(id));
  if (allSelected) ids.forEach(id => selectedBizIds.delete(id));
  else ids.forEach(id => selectedBizIds.add(id));
  refreshBizList();
};

window.clearBizSelection = function() {
  selectedBizIds.clear();
  refreshBizList();
};

// פעולה גורפת לדוגמה בלבד — משנה סטטוס במוק המקומי, לא כותבת לשום מקום אמיתי
window.bulkSetBizStatus = function(status) {
  selectedBizIds.forEach(id => { const b = bizById(id); if (b) b.status = status; });
  selectedBizIds.clear();
  renderMain();
};

function bizBulkBarHtml() {
  const count = selectedBizIds.size;
  if (!count) return `<div id="bizBulkBarWrap"></div>`;
  return `
    <div id="bizBulkBarWrap">
      <div class="biz-bulk-bar">
        <span>נבחרו ${count}</span>
        <span class="sp"></span>
        <button class="biz-bulk-btn approve" onclick="bulkSetBizStatus('approved')">✅ אשר נבחרים</button>
        <button class="biz-bulk-btn reject" onclick="bulkSetBizStatus('rejected')">✗ דחה נבחרים</button>
        <button class="biz-bulk-btn cancel" onclick="clearBizSelection()">ביטול</button>
      </div>
    </div>`;
}

function bizFilterBarHtml() {
  const changesCount = MOCK_BUSINESSES.filter(b => b.hasPendingChange).length;
  const btn = (val, label) => `<button class="biz-filter-btn ${bizStatusFilter===val?'active':''}" onclick="setBizStatusFilter('${val}')">${label}</button>`;
  return `
    <div class="biz-filter-bar">
      ${btn('all', 'הכל')}
      ${btn('pending', 'ממתינים')}
      ${btn('approved', 'מאושרים')}
      ${btn('rejected', 'נדחו')}
      <button class="biz-filter-btn changes ${bizStatusFilter==='changes'?'active':''}" onclick="setBizStatusFilter('changes')">✏️ שינויים <span class="biz-changes-badge">${changesCount}</span></button>
      <input class="biz-search" type="search" placeholder="🔍 חיפוש שם עסק..." oninput="filterBizRows(this.value)">
    </div>`;
}

function bizSelectAllRowHtml() {
  const ids = bizFilteredList().map(b => b.id);
  const allSelected = ids.length > 0 && ids.every(id => selectedBizIds.has(id));
  return `
    <div class="biz-select-all-row" id="bizSelectAllRow">
      <button class="biz-select-all-btn ${allSelected?'active':''}" onclick="toggleSelectAllBiz()">${allSelected ? '☑ בטל בחירת הכל' : '☐ בחר הכל'}</button>
      <span class="biz-sel-count">${selectedBizIds.size ? selectedBizIds.size + ' נבחרו' : ''}</span>
    </div>`;
}

// 3 כרטיסי מידע בדיוק כמו ב-admin-businesses.html (עסקים נרשמו / ממתינים לאישור / עסקים פעילים) —
// תצוגה בלבד, לא כפתורי סינון (הסינון האמיתי הוא ב-filter-bar למטה, כמו במקור).
function bizListHtml() {
  const approved = MOCK_BUSINESSES.filter(b => b.status === 'approved').length;
  const pending  = MOCK_BUSINESSES.filter(b => b.status === 'pending').length;
  return `
    <div class="biz-stats-row">
      <div class="biz-stat-card"><div class="num">${MOCK_BUSINESSES.length}</div><div class="lbl">עסקים נרשמו</div></div>
      <div class="biz-stat-card pending"><div class="num">${pending}</div><div class="lbl">ממתינים לאישור</div></div>
      <div class="biz-stat-card approved"><div class="num">${approved}</div><div class="lbl">עסקים פעילים</div></div>
    </div>
    ${bizFilterBarHtml()}
    ${bizSelectAllRowHtml()}
    ${bizBulkBarHtml()}
    <div class="biz-list" id="bizListRows">${bizRowsHtml()}</div>`;
}

function renderMain() {
  const wrap = document.getElementById('tabContent');
  if (!activeTab) {
    wrap.innerHTML = `<div class="placeholder-note">👈 בחר פריט מהתפריט בצד כדי להתחיל</div>`;
    return;
  }
  if (activeTab === ALL_BIZ_KEY) {
    wrap.innerHTML = bizListHtml();
    return;
  }
  const tab = tabMeta(activeTab);
  wrap.innerHTML = `
    ${infoAccordionHtml()}
    ${tabInfoHtml(tab)}
    ${expiringPanelHtml()}
    <div class="preview-label">👁 ככה זה ייראה בפועל</div>
    <div class="preview-strip">${previewStripHtml(tab)}</div>
    <div class="slots">${slotsHtml(tab)}</div>
    <div class="section-note">10 המיקומים הראשונים בלבד ניתנים לעיגון. השאר תמיד אוטומטי.</div>`;
}

function renderAll() {
  renderSidebar();
  renderMain();
}
