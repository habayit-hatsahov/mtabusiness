name = "habayit-hatsahov-worker"
main = "src/index.js"
compatibility_date = "2024-11-01"

# workers.dev subdomain (ראה docs/PROJECT_CONTEXT.md — לא הוקצה דומיין מותאם עדיין)
workers_dev = true

[vars]
# מספר דומיינים מופרדים בפסיק — דומיין הפרודקשן + שרת הפיתוח המקומי (server.ps1, לבדיקות ידניות בלבד)
ALLOWED_ORIGIN = "https://yellowzone.co.il,https://www.yellowzone.co.il,https://habayit-hatsahov.github.io,http://localhost:5502"
FIREBASE_PROJECT_ID = "habayit-hatsahov"
# חייב להיות זהה בדיוק ל-storageBucket ב-firebase-config.js — נדרש ל-backfill thumbnails (src/backfill.js)
FIREBASE_STORAGE_BUCKET = "habayit-hatsahov.firebasestorage.app"
# כתובת שולח מיילים — חייבת להיות מאומתת ב-Brevo (Senders), אחרת המייל "נשלח" בלי שגיאה אבל לא מגיע בפועל
SENDER_EMAIL = "noreply@yellowzone.co.il"
# מודל Gemini לקיצור טקסטי הטבה (ר' src/gemini.js) — לא סוד, אפשר לשנות ישירות כאן בלי wrangler secret
GEMINI_MODEL = "gemini-2.5-flash"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "82465044935c4db9ab776e768a88d1f9"

[triggers]
crons = ["* * * * *"]

# Cloudflare Images Workers Binding — משמש רק ל-resize בזמן ריצה (env.IMAGES.input().transform()),
# לא לאחסון/CDN של Cloudflare Images עצמו. דורש שהמוצר "Cloudflare Images" מופעל בחשבון (ר' src/backfill.js).
# פיתוח מקומי: `wrangler dev --remote` (ה-binding לא זמין ב-dev מקומי רגיל).
[images]
binding = "IMAGES"

# Secrets (לא כאן — בהרצה: wrangler secret put <NAME>):
#   FIREBASE_SERVICE_ACCOUNT_JSON   — תוכן קובץ ה-service-account JSON השלם
#   BREVO_API_KEY                   — מפתח ה-API של Brevo
#   ANTHROPIC_API_KEY               — מפתח ה-API של Anthropic, בשימוש פעיל (לקיצור טקסטי הטבה ע"י AI, ר' src/anthropic.js)
#   PEXELS_API_KEY                  — מפתח ה-API של Pexels (חינמי, pexels.com/api), לתמונת ברירת מחדל לעסק בלי תמונה (ר' src/pexels.js)
#   GEMINI_API_KEY                  — מפתח ה-API של Google AI Studio, כבר מוגדר אך לא בשימוש כרגע (src/gemini.js מוכן,
#                                      ממתין לפרויקט Google Cloud עם מכסה — ר' docs/PROJECT_CONTEXT.md)
#   ADMIN_BACKFILL_SECRET           — סוד חד-פעמי להרשאת /backfill-thumbnails (ר' src/index.js) — לא קשור ל-Firebase Auth,
#                                      רק כדי שה-endpoint לא יהיה פתוח לחלוטין לאינטרנט
