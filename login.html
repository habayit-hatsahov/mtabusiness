<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#003DA5" />
  <title>הבית הצהוב – כניסה</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow:      #FFD700;
      --yellow-dark: #E6C200;
      --yellow-glow: #FFF176;
      --blue:        #003DA5;
      --blue-dark:   #002a75;
      --blue-mid:    #1a56c4;
      --white:       #FFFFFF;
      --orange:      #d97706;
    }

    html, body {
      height: 100%;
      font-family: 'Heebo', sans-serif;
      background: var(--blue-dark);
      color: var(--white);
      overflow-x: hidden;
    }

    /* ── BACKGROUND ── */
    .bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(255,215,0,.13) 0%, transparent 70%),
        linear-gradient(160deg, var(--blue-dark) 0%, #001f5c 50%, var(--blue-dark) 100%);
      z-index: 0;
    }
    .bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 15% 85%, rgba(255,215,0,.06) 0%, transparent 40%),
        radial-gradient(circle at 85% 15%, rgba(26,86,196,.3) 0%, transparent 40%);
    }

    /* subtle grid lines */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,215,0,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,215,0,.03) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ── LAYOUT ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 40px;
    }

    /* ── LOGO AREA ── */
    .logo-wrap {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-emblem {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      filter: drop-shadow(0 8px 24px rgba(255,215,0,.35)) drop-shadow(0 2px 8px rgba(0,0,0,.4));
    }

    .logo-title {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .logo-title span {
      color: var(--yellow);
    }

    .logo-sub {
      margin-top: 6px;
      font-size: 13px;
      font-weight: 300;
      color: rgba(255,255,255,.5);
      letter-spacing: 0.5px;
    }

    /* ── CARD ── */
    .card {
      width: 100%;
      max-width: 400px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 24px;
      padding: 36px 32px;
      backdrop-filter: blur(20px);
      box-shadow:
        0 32px 80px rgba(0,0,0,.5),
        inset 0 1px 0 rgba(255,255,255,.1);
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
      text-align: center;
    }

    .card-desc {
      font-size: 13px;
      color: rgba(255,255,255,.5);
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    /* ── STEPS ── */
    .step { display: none; }
    .step.active { display: block; }

    /* ── INPUT ── */
    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,.6);
      margin-bottom: 8px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .field input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,.07);
      border: 1.5px solid rgba(255,255,255,.12);
      border-radius: 12px;
      color: var(--white);
      font-family: 'Heebo', sans-serif;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 1px;
      outline: none;
      transition: border-color .2s, background .2s, box-shadow .2s;
      text-align: center;
      direction: ltr;
    }

    .field input::placeholder {
      color: rgba(255,255,255,.25);
      font-size: 15px;
      letter-spacing: 0;
    }

    .field input:focus {
      border-color: var(--yellow);
      background: rgba(255,215,0,.07);
      box-shadow: 0 0 0 3px rgba(255,215,0,.12);
    }

    /* ── OTP INPUT ── */
    .otp-wrap {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 16px;
    }

    .otp-wrap input {
      width: 48px;
      height: 56px;
      padding: 0;
      background: rgba(255,255,255,.07);
      border: 1.5px solid rgba(255,255,255,.12);
      border-radius: 12px;
      color: var(--white);
      font-family: 'Heebo', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0;
      outline: none;
      transition: border-color .2s, background .2s, box-shadow .2s;
      text-align: center;
      direction: ltr;
      caret-color: var(--yellow);
    }

    .otp-wrap input:focus {
      border-color: var(--yellow);
      background: rgba(255,215,0,.07);
      box-shadow: 0 0 0 3px rgba(255,215,0,.12);
    }

    .otp-wrap input.filled {
      border-color: rgba(255,215,0,.5);
    }

    /* ── BUTTON ── */
    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--yellow) 0%, var(--yellow-dark) 100%);
      color: var(--blue-dark);
      border: none;
      border-radius: 12px;
      font-family: 'Heebo', sans-serif;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, opacity .15s;
      box-shadow: 0 4px 20px rgba(255,215,0,.3);
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(255,215,0,.4); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-ghost {
      width: 100%;
      padding: 12px;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,.15);
      border-radius: 12px;
      color: rgba(255,255,255,.6);
      font-family: 'Heebo', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color .2s, color .2s;
      margin-top: 10px;
    }
    .btn-ghost:hover { border-color: rgba(255,255,255,.35); color: var(--white); }

    /* ── SPINNER ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(0,42,117,.3);
      border-top-color: var(--blue-dark);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }

    /* ── PHONE DISPLAY ── */
    .phone-display {
      text-align: center;
      font-size: 15px;
      color: rgba(255,255,255,.6);
      margin-bottom: 20px;
    }
    .phone-display strong {
      color: var(--yellow);
      font-weight: 700;
      display: block;
      font-size: 18px;
      margin-top: 4px;
      letter-spacing: 1px;
      direction: ltr;
    }

    /* ── ERROR ── */
    .error-msg {
      display: none;
      background: rgba(217,119,6,.15);
      border: 1px solid rgba(217,119,6,.4);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: #fbbf24;
      margin-bottom: 14px;
      text-align: center;
      line-height: 1.5;
    }
    .error-msg.show { display: block; }

    /* ── RESEND ── */
    .resend-wrap {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: rgba(255,255,255,.4);
    }
    .resend-btn {
      background: none;
      border: none;
      color: var(--yellow);
      font-family: 'Heebo', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      display: none;
    }
    .resend-btn.show { display: inline; }
    #resend-countdown { color: rgba(255,255,255,.5); }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: rgba(255,255,255,.2);
      font-size: 12px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,.1);
    }

    /* ── FOOTER ── */
    .footer-links {
      text-align: center;
      margin-top: 28px;
      font-size: 13px;
      color: rgba(255,255,255,.35);
    }
    .footer-links a {
      color: rgba(255,255,255,.55);
      text-decoration: none;
      font-weight: 500;
      transition: color .2s;
    }
    .footer-links a:hover { color: var(--yellow); }

    /* ── BADGE ── */
    .exclusive-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,215,0,.1);
      border: 1px solid rgba(255,215,0,.2);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 11px;
      font-weight: 600;
      color: var(--yellow);
      letter-spacing: 0.5px;
      margin-bottom: 24px;
      text-transform: uppercase;
    }
    .exclusive-badge::before { content: '🔒'; font-size: 11px; }

    /* recaptcha hidden */
    #recaptcha-container { display: none; }
  </style>
</head>
<body>

<div class="bg"></div>

<div class="page">

  <!-- LOGO -->
  <div class="logo-wrap">

    <div class="logo-title">הבית <span>הצהוב</span></div>
    <div class="logo-sub">אינדקס עסקים ומועדון הטבות</div>
  </div>

  <div style="text-align:center; margin-bottom: 20px;">
    <span class="exclusive-badge">לחברים מאושרים בלבד</span>
  </div>

  <!-- CARD -->
  <div class="card">

    <!-- STEP 1: PHONE -->
    <div class="step active" id="step-phone">
      <div class="card-title">כניסה לחברים</div>
      <div class="card-desc">הזן את מספר הטלפון שלך<br>ונשלח לך קוד אימות ב-SMS</div>

      <div id="error-phone" class="error-msg"></div>

      <div class="field">
        <label>מספר טלפון</label>
        <input type="tel" id="phone-input" placeholder="050-0000000" inputmode="tel" autocomplete="tel" />
      </div>

      <button class="btn" id="btn-send" onclick="sendOTP()">
        שליחת קוד
      </button>
    </div>

    <!-- STEP 2: OTP -->
    <div class="step" id="step-otp">
      <div class="card-title">הזן קוד אימות</div>
      <div class="phone-display">
        שלחנו קוד SMS אל
        <strong id="phone-display-val"></strong>
      </div>

      <div id="error-otp" class="error-msg"></div>

      <div class="otp-wrap" id="otp-inputs">
        <input type="text" inputmode="numeric" maxlength="1" class="otp-digit" />
        <input type="text" inputmode="numeric" maxlength="1" class="otp-digit" />
        <input type="text" inputmode="numeric" maxlength="1" class="otp-digit" />
        <input type="text" inputmode="numeric" maxlength="1" class="otp-digit" />
        <input type="text" inputmode="numeric" maxlength="1" class="otp-digit" />
        <input type="text" inputmode="numeric" maxlength="1" class="otp-digit" />
      </div>

      <button class="btn" id="btn-verify" onclick="verifyOTP()" disabled>
        כניסה
      </button>

      <div class="resend-wrap">
        <span id="resend-countdown"></span>
        <button class="resend-btn" id="resend-btn" onclick="resendOTP()">שלח קוד מחדש</button>
      </div>

      <button class="btn-ghost" onclick="backToPhone()">← שינוי מספר</button>
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer-links">
    עדיין לא חבר? <a href="fan-register.html">הצטרף עכשיו</a>

    <a href="business.html">רישום עסק</a>
  </div>

<div id="recaptcha-container"></div>

<script type="module">
  import { auth } from './firebase-config.js';
  import {
    RecaptchaVerifier,
    signInWithPhoneNumber,
    browserLocalPersistence,
    setPersistence
  } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
  import { db } from './firebase-config.js';
  import {
    collection, query, where, getDocs
  } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

  // ── Persistence: session lasts until sign-out, we enforce monthly re-auth via localStorage ──
  await setPersistence(auth, browserLocalPersistence);

  // ── Check if already logged in and session < 30 days ──
  auth.onAuthStateChanged(async (user) => {
    if (!user) return;
    const loginTime = parseInt(localStorage.getItem('hby_login_ts') || '0');
    const thirtyDays = 30 * 24 * 60 * 60 * 1000;
    if (Date.now() - loginTime > thirtyDays) {
      await auth.signOut();
      localStorage.removeItem('hby_login_ts');
      return;
    }
    // still valid — redirect based on role
    await redirectUser(user);
  });

  let confirmationResult = null;
  let resendTimer = null;
  let phoneE164 = '';

  // ── Normalize Israeli phone → E.164 ──
  function normalizePhone(raw) {
    let p = raw.replace(/[\s\-\.]/g, '');
    if (p.startsWith('0')) p = '+972' + p.slice(1);
    if (!p.startsWith('+')) p = '+972' + p;
    return p;
  }

  function isValidIsraeliPhone(raw) {
    const clean = raw.replace(/[\s\-\.]/g, '');
    return /^0[25789]\d{8}$/.test(clean);
  }

  // ── RecaptchaVerifier (invisible) ──
  function getRecaptcha() {
    if (!window._recaptcha) {
      window._recaptcha = new RecaptchaVerifier(auth, 'recaptcha-container', {
        size: 'invisible'
      });
    }
    return window._recaptcha;
  }

  // ── SEND OTP ──
  window.sendOTP = async function() {
    const raw = document.getElementById('phone-input').value.trim();
    const errEl = document.getElementById('error-phone');
    errEl.classList.remove('show');

    if (!isValidIsraeliPhone(raw)) {
      showError(errEl, 'נא להזין מספר טלפון ישראלי תקין (10 ספרות)');
      return;
    }

    phoneE164 = normalizePhone(raw);
    setLoading('btn-send', true);

    try {
      confirmationResult = await signInWithPhoneNumber(auth, phoneE164, getRecaptcha());
      showStep('step-otp');
      document.getElementById('phone-display-val').textContent = raw;
      startResendTimer(60);
      focusFirstOtp();
    } catch (e) {
      console.error(e);
      if (e.code === 'auth/too-many-requests') {
        showError(errEl, 'יותר מדי ניסיונות. נסה שוב מאוחר יותר.');
      } else if (e.code === 'auth/invalid-phone-number') {
        showError(errEl, 'מספר הטלפון אינו תקין.');
      } else {
        showError(errEl, 'שגיאה בשליחת הקוד. נסה שוב.');
      }
      // reset recaptcha on error
      window._recaptcha = null;
    } finally {
      setLoading('btn-send', false);
    }
  };

  // ── VERIFY OTP ──
  window.verifyOTP = async function() {
    const code = getOtpValue();
    const errEl = document.getElementById('error-otp');
    errEl.classList.remove('show');

    if (code.length !== 6) {
      showError(errEl, 'נא להזין את כל 6 הספרות');
      return;
    }

    setLoading('btn-verify', true);

    try {
      const result = await confirmationResult.confirm(code);
      const user = result.user;

      // ── Look up member in Firestore ──
      const phoneRaw = document.getElementById('phone-input').value.trim();
      const memberData = await findMember(phoneRaw, phoneE164);

      if (!memberData) {
        await auth.signOut();
        showError(errEl, 'מספר זה אינו רשום כחבר מאושר בהבית הצהוב.');
        setLoading('btn-verify', false);
        return;
      }

      // ── Save login timestamp for monthly re-auth ──
      localStorage.setItem('hby_login_ts', Date.now().toString());
      localStorage.setItem('hby_member_id', memberData.id);
      localStorage.setItem('hby_is_admin', memberData.isAdmin ? '1' : '0');

      await redirectUser(user, memberData);

    } catch (e) {
      console.error(e);
      if (e.code === 'auth/invalid-verification-code') {
        showError(errEl, 'הקוד שהוזן שגוי. נסה שוב.');
      } else if (e.code === 'auth/code-expired') {
        showError(errEl, 'הקוד פג תוקף. שלח קוד חדש.');
      } else if (e.code !== undefined) {
        showError(errEl, 'שגיאה באימות. נסה שוב.');
      }
      setLoading('btn-verify', false);
    }
  };

  // ── Find member by phone (try multiple formats) ──
  async function findMember(rawPhone, e164) {
    const membersRef = collection(db, 'members');
    const formatsToTry = new Set([
      rawPhone,
      rawPhone.replace(/[\s\-\.]/g, ''),
      e164,
      '0' + e164.replace('+972', '')
    ]);

    for (const fmt of formatsToTry) {
      const q = query(membersRef, where('phone', '==', fmt), where('status', '==', 'approved'));
      const snap = await getDocs(q);
      if (!snap.empty) {
        const doc = snap.docs[0];
        return { id: doc.id, ...doc.data() };
      }
    }
    return null;
  }

  // ── Redirect after login ──
  async function redirectUser(user, memberData) {
    if (!memberData) {
      // If called from onAuthStateChanged, reload stored role
      const isAdmin = localStorage.getItem('hby_is_admin') === '1';
      window.location.href = isAdmin ? 'admin.html' : 'home.html';
      return;
    }
    window.location.href = memberData.isAdmin ? 'admin.html' : 'home.html';
  }

  // ── RESEND ──
  window.resendOTP = async function() {
    const errEl = document.getElementById('error-otp');
    errEl.classList.remove('show');
    window._recaptcha = null;
    document.getElementById('resend-btn').classList.remove('show');

    try {
      confirmationResult = await signInWithPhoneNumber(auth, phoneE164, getRecaptcha());
      startResendTimer(60);
    } catch (e) {
      showError(errEl, 'שגיאה בשליחת הקוד. נסה שוב.');
    }
  };

  window.backToPhone = function() {
    clearTimer();
    showStep('step-phone');
    clearOtp();
    document.getElementById('error-otp').classList.remove('show');
  };

  // ── OTP input UX ──
  function setupOtpInputs() {
    const inputs = document.querySelectorAll('.otp-digit');
    inputs.forEach((inp, i) => {
      inp.addEventListener('input', e => {
        const val = e.target.value.replace(/\D/g, '');
        e.target.value = val.slice(-1);
        e.target.classList.toggle('filled', !!e.target.value);
        if (val && i < inputs.length - 1) inputs[i + 1].focus();
        checkOtpComplete();
      });

      inp.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !e.target.value && i > 0) {
          inputs[i - 1].focus();
          inputs[i - 1].value = '';
          inputs[i - 1].classList.remove('filled');
          checkOtpComplete();
        }
      });

      inp.addEventListener('paste', e => {
        e.preventDefault();
        const text = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
        text.split('').slice(0, 6).forEach((ch, j) => {
          if (inputs[j]) {
            inputs[j].value = ch;
            inputs[j].classList.add('filled');
          }
        });
        const next = inputs[Math.min(text.length, 5)];
        if (next) next.focus();
        checkOtpComplete();
      });
    });
  }

  function checkOtpComplete() {
    const code = getOtpValue();
    document.getElementById('btn-verify').disabled = code.length < 6;
    if (code.length === 6) {
      document.getElementById('btn-verify').focus();
    }
  }

  function getOtpValue() {
    return [...document.querySelectorAll('.otp-digit')].map(i => i.value).join('');
  }

  function clearOtp() {
    document.querySelectorAll('.otp-digit').forEach(i => {
      i.value = '';
      i.classList.remove('filled');
    });
    document.getElementById('btn-verify').disabled = true;
  }

  function focusFirstOtp() {
    const first = document.querySelector('.otp-digit');
    if (first) setTimeout(() => first.focus(), 100);
  }

  // ── Timer ──
  function startResendTimer(seconds) {
    clearTimer();
    const countEl = document.getElementById('resend-countdown');
    const btnEl = document.getElementById('resend-btn');
    btnEl.classList.remove('show');
    countEl.textContent = `שלח שוב בעוד ${seconds} שניות`;

    let remaining = seconds;
    resendTimer = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearTimer();
        countEl.textContent = '';
        btnEl.classList.add('show');
      } else {
        countEl.textContent = `שלח שוב בעוד ${remaining} שניות`;
      }
    }, 1000);
  }

  function clearTimer() {
    if (resendTimer) { clearInterval(resendTimer); resendTimer = null; }
  }

  // ── Helpers ──
  function showStep(id) {
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showError(el, msg) {
    el.textContent = msg;
    el.classList.add('show');
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (loading) {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
    } else {
      btn.disabled = false;
      btn.innerHTML = btnId === 'btn-send' ? 'שליחת קוד' : 'כניסה';
    }
  }

  // ── Phone input: Enter key ──
  document.getElementById('phone-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.sendOTP();
  });

  setupOtpInputs();
</script>
</body>
