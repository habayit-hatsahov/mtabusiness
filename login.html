<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>הבית הצהוב – כניסה</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --yellow:    #FFDE00;
      --yellow-dk: #D4B800;
      --orange:    #d97706;
      --bg:        #151C2E;
      --card-bg:   #1a2440;
      --border:    rgba(255,255,255,0.07);
      --border-md: rgba(255,255,255,0.14);
      --text:      #FFFFFF;
      --text-sm:   rgba(255,255,255,0.5);
      --text-muted:rgba(255,255,255,0.32);
    }
    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-md);
      border-radius: 24px;
      padding: 40px 32px;
      width: 100%; max-width: 400px;
      box-shadow: 0 16px 48px rgba(0,0,0,.4);
      text-align: center;
    }
    .logo-wrap {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 24px;
    }
    .logo-text { font-size: 22px; font-weight: 900; color: var(--text); }
    .logo-text span { color: var(--yellow); }
    h1 { font-size: 22px; font-weight: 900; color: var(--text); margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: var(--text-sm); margin-bottom: 32px; line-height: 1.6; }
    .form-group { margin-bottom: 16px; text-align: right; }
    label { font-size: 13px; font-weight: 700; color: var(--text-sm); display: block; margin-bottom: 6px; }
    .phone-row { display: flex; gap: 8px; }
    .phone-prefix {
      background: rgba(255,255,255,0.06); border: 1.5px solid var(--border-md);
      border-radius: 12px; padding: 12px 14px;
      font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 700;
      color: var(--text-sm); white-space: nowrap; flex-shrink: 0;
    }
    input[type="tel"], input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid var(--border-md);
      border-radius: 12px; padding: 12px 14px;
      font-family: 'Heebo', sans-serif; font-size: 16px;
      color: var(--text); outline: none;
      transition: border-color .2s;
    }
    input::placeholder { color: var(--text-muted); }
    input:focus { border-color: var(--yellow); }
    input.error-input { border-color: var(--orange); background: rgba(217,119,6,0.08); }
    .err-msg {
      display: none; margin-top: 8px;
      background: rgba(217,119,6,0.1); border: 1.5px solid rgba(217,119,6,0.3);
      border-radius: 10px; padding: 10px 14px;
      font-size: 13px; color: var(--orange); font-weight: 600;
      text-align: right; line-height: 1.5;
    }
    .err-msg.show { display: block; }
    .info-msg {
      display: none; margin-top: 8px;
      background: rgba(255,222,0,0.08); border: 1.5px solid rgba(255,222,0,0.3);
      border-radius: 10px; padding: 10px 14px;
      font-size: 13px; color: var(--yellow); font-weight: 600;
      text-align: right; line-height: 1.5;
    }
    .info-msg.show { display: block; }
    .btn {
      width: 100%; padding: 14px;
      background: var(--yellow);
      color: #0f1524; border: none; border-radius: 14px;
      font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 900;
      cursor: pointer; transition: opacity .2s; margin-top: 8px;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn:not(:disabled):active { opacity: .85; }
    .code-input {
      text-align: center; font-size: 28px; letter-spacing: 6px;
      font-weight: 900; color: var(--yellow);
    }
    .forgot-link {
      background: none; border: none; color: var(--yellow);
      font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer; text-decoration: underline; margin-top: 18px;
      display: block; width: 100%; text-align: center;
    }
    .forgot-section { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); text-align: right; }
    .forgot-section.show { display: block; }
    .resend-row { margin-top: 10px; font-size: 13px; color: var(--text-muted); text-align: center; }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,.2);
      border-top-color: #0f1524; border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <svg width="24" height="27" viewBox="0 0 104 118" fill="none">
      <g style="fill:#FFD700;">
        <g transform="matrix(1.25,0,0,1.25,0,30.09)"><path d="M0,0 26,0 13,22.9Z"/></g>
        <g transform="matrix(1.25,0,0,1.25,0.42,30.09)"><path d="M27.4,0 16.4,19.1 32.4,19.1 32.4,31.9 8.7,31.9 0,46.6 41.8,46.6 41.8,31.9 40.4,31.9 40.4,19.1Z"/></g>
        <g transform="matrix(1.25,0,0,1.25,24.2,58.2)"><path d="M3.8,0A3.8,3.8,0,1,1,0,3.8A3.8,3.8,0,0,1,3.8,0Z"/></g>
        <g transform="matrix(1.25,0,0,1.25,34.4,57.3)"><path d="M0.2,25.8 13.6,48.8 26.9,25.8 26.9,0 21.9,0 21.9,25.8Z"/></g>
        <g transform="matrix(1.25,0,0,1.25,36.9,30)"><path d="M0.2,0 13.8,20 13.8,46.6 18.9,40.1 18.9,21 29.2,21 29.2,32.1 25.9,32.1 25.9,46.6 52.7,46.6 39.8,23.5 53.9,0 26.9,0 16,14 5.9,0Z"/></g>
        <g transform="matrix(1.25,0,0,1.25,35.2,0)"><path d="M0,23.4 13.2,0 26.9,23.4 17.4,35.9 8.4,23.4Z"/></g>
      </g>
    </svg>
    <div class="logo-text">הבית <span>הצהוב</span></div>
  </div>

  <h1>כניסה לאינדקס</h1>
  <p class="subtitle">הזינו את מספר הטלפון ואת קוד הכניסה<br>שקיבלתם במייל לאחר אישור החברות</p>

  <div class="form-group">
    <label>מספר טלפון</label>
    <div class="phone-row">
      <div class="phone-prefix">🇮🇱 +972</div>
      <input type="tel" id="phoneInput" placeholder="05X-XXXXXXX"
             inputmode="tel" maxlength="12"
             oninput="clearErr()" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
  </div>

  <div class="form-group">
    <label>קוד כניסה (6 ספרות)</label>
    <input type="text" id="codeInput" class="code-input"
           placeholder="• • • • • •" maxlength="6"
           inputmode="numeric" pattern="[0-9]*"
           oninput="this.value=this.value.replace(/\D/g,''); clearErr()"
           onkeydown="if(event.key==='Enter')doLogin()"/>
  </div>

  <div class="err-msg" id="loginErr"></div>
  <button class="btn" id="loginBtn" onclick="doLogin()">כניסה</button>

  <button class="forgot-link" onclick="toggleForgot()">איבדת את קוד הכניסה שנשלח לך במייל?</button>

  <div class="forgot-section" id="forgotSection">
    <div class="form-group" style="margin-bottom:10px;">
      <label>מספר טלפון (לשליחת הקוד למייל שנרשם)</label>
      <div class="phone-row">
        <div class="phone-prefix">🇮🇱 +972</div>
        <input type="tel" id="forgotPhoneInput" placeholder="05X-XXXXXXX" inputmode="tel" maxlength="12"/>
      </div>
    </div>
    <div class="info-msg" id="forgotMsg"></div>
    <button class="btn" id="forgotBtn" onclick="requestCodeResend()" style="background:rgba(255,222,0,0.15);color:var(--yellow);">שלח לי את הקוד למייל</button>
    <div class="resend-row" id="forgotCooldown" style="display:none;"></div>
  </div>
</div>

<script type="module">
import { db } from './firebase-config.js';
import {
  collection, query, where, getDocs, doc, updateDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

function normalizePhoneDigits(raw) {
  let d = (raw || '').replace(/\D/g, '');
  if (d.startsWith('972')) d = '0' + d.slice(3);
  if (!d.startsWith('0'))  d = '0' + d;
  return d; // "0501234567"
}

// כמה וריאציות פורמט אפשריות שהמספר עשוי להישמר בהן ב-Firestore (הרשמה שומרת כטקסט חופשי, ללא נרמול)
function phoneCandidates(raw) {
  const local = normalizePhoneDigits(raw);
  const dashed = local.length === 10 ? local.slice(0,3) + '-' + local.slice(3) : local;
  const e164 = '+972' + local.slice(1);
  return [...new Set([local, dashed, e164])];
}

window.doLogin = async function() {
  const phoneRaw = document.getElementById('phoneInput').value.trim();
  const code = document.getElementById('codeInput').value.trim();
  if (!phoneRaw) return showErr('נא להזין מספר טלפון');
  if (code.length !== 6) return showErr('נא להזין קוד בן 6 ספרות');

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = 'בודק... <span class="spinner"></span>';

  try {
    const enteredDigits = normalizePhoneDigits(phoneRaw);
    const snap = await getDocs(query(collection(db, 'members'), where('loginCode', '==', code)));
    const codeDoc = snap.docs[0];
    const codeMatches = codeDoc
      && normalizePhoneDigits(codeDoc.data().phone) === enteredDigits
      && codeDoc.data().status === 'approved';

    if (codeMatches) {
      localStorage.setItem('hb_phone', enteredDigits);
      localStorage.setItem('hb_memberId', codeDoc.id);
      const next = new URLSearchParams(location.search).get('next') || 'home.html';
      location.href = next;
      return;
    }

    // הקוד/הצירוף לא תקינים — בדיקה נוספת רק לפי טלפון, כדי לתת הודעה מדויקת
    // (חבר ממתין לאישור עדיין לא קיבל loginCode בכלל, לכן לא יימצא בשאילתה הראשונה)
    const phoneSnap = await getDocs(query(collection(db, 'members'), where('phone', 'in', phoneCandidates(phoneRaw))));
    const phoneDoc = phoneSnap.docs.find(d => d.data().status !== 'approved');

    btn.disabled = false; btn.textContent = 'כניסה';
    if (phoneDoc) {
      const st = phoneDoc.data().status;
      showErr(st === 'pending'
        ? 'הבקשה שלך עדיין ממתינה לאישור. ברגע שתאושר תישלח אליך הודעת מייל עם קוד כניסה.'
        : 'הבקשה שלך נדחתה. לפרטים צור קשר עם הצוות.');
    } else {
      showErr('מספר טלפון או קוד שגויים');
    }
  } catch (e) {
    btn.disabled = false; btn.textContent = 'כניסה';
    showErr('שגיאה — נסה שוב');
  }
};

window.toggleForgot = function() {
  const sec = document.getElementById('forgotSection');
  sec.classList.toggle('show');
  if (sec.classList.contains('show')) {
    const phone = document.getElementById('phoneInput').value.trim();
    if (phone) document.getElementById('forgotPhoneInput').value = phone;
  }
};

window.requestCodeResend = async function() {
  const phoneRaw = document.getElementById('forgotPhoneInput').value.trim();
  if (!phoneRaw) return showForgotMsg('נא להזין מספר טלפון');

  const btn = document.getElementById('forgotBtn');
  btn.disabled = true;
  btn.innerHTML = 'שולח... <span class="spinner"></span>';

  try {
    const candidates = phoneCandidates(phoneRaw);
    const snap = await getDocs(query(collection(db, 'members'), where('phone', 'in', candidates)));
    const memberDoc = snap.docs.find(d => d.data().status === 'approved' && d.data().loginCode);

    if (memberDoc) {
      const m = memberDoc.data();
      const lastSent = m.lastCodeResendAt?.toDate?.();
      const cooldownMs = 60 * 1000;
      if (lastSent && (Date.now() - lastSent.getTime()) < cooldownMs) {
        const waitSec = Math.ceil((cooldownMs - (Date.now() - lastSent.getTime())) / 1000);
        showForgotMsg(`קוד כבר נשלח לאחרונה — נסו שוב בעוד ${waitSec} שניות`);
      } else {
        await updateDoc(doc(db, 'members', memberDoc.id), {
          loginCodeEmailStatus: 'pending',
          lastCodeResendAt: serverTimestamp()
        });
      }
    }
    // הודעה זהה בין "נמצא" ל"לא נמצא" — כדי לא לחשוף אילו מספרים רשומים במערכת
    showForgotMsg('אם המספר קיים במערכת המאושרת — הקוד יישלח למייל שנרשם בהקדם.');
  } catch (e) {
    showForgotMsg('שגיאה — נסה שוב מאוחר יותר');
  } finally {
    btn.disabled = false;
    btn.textContent = 'שלח לי את הקוד למייל';
  }
};

window.clearErr = () => {
  document.getElementById('loginErr').classList.remove('show');
  document.getElementById('phoneInput').classList.remove('error-input');
  document.getElementById('codeInput').classList.remove('error-input');
};

function showErr(msg) {
  const el = document.getElementById('loginErr');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('phoneInput').classList.add('error-input');
  document.getElementById('codeInput').classList.add('error-input');
}

function showForgotMsg(msg) {
  const el = document.getElementById('forgotMsg');
  el.textContent = msg; el.classList.add('show');
}

// אם כבר מחובר — דלג ישר
if (localStorage.getItem('hb_memberId')) {
  const next = new URLSearchParams(location.search).get('next') || 'home.html';
  location.href = next;
}
</script>
</body>
</html>
