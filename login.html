<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>הבית הצהוב – כניסה</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --yellow:  #FFD700;
      --blue:    #003DA5;
      --blue-dk: #002a75;
      --orange:  #d97706;
      --white:   #FFFFFF;
      --bg:      #F5F6FA;
      --text:    #1a1a1a;
      --gray:    #888;
    }
    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: var(--white);
      border-radius: 24px;
      padding: 40px 32px;
      width: 100%; max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,.1);
      text-align: center;
    }
    .logo-wrap {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-bottom: 24px;
    }
    .logo-text { font-size: 22px; font-weight: 900; color: var(--blue-dk); }
    .logo-text span { color: var(--yellow); }
    h1 { font-size: 22px; font-weight: 900; color: var(--text); margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: var(--gray); margin-bottom: 32px; line-height: 1.6; }
    .form-group { margin-bottom: 16px; text-align: right; }
    label { font-size: 13px; font-weight: 700; color: var(--text); display: block; margin-bottom: 6px; }
    .phone-row { display: flex; gap: 8px; }
    .phone-prefix {
      background: #F1F5F9; border: 1.5px solid #E2E8F0;
      border-radius: 12px; padding: 12px 14px;
      font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 700;
      color: var(--blue); white-space: nowrap; flex-shrink: 0;
    }
    input[type="tel"], input[type="text"] {
      width: 100%;
      border: 1.5px solid #E2E8F0;
      border-radius: 12px; padding: 12px 14px;
      font-family: 'Heebo', sans-serif; font-size: 16px;
      color: var(--text); outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: var(--blue); }
    input.error-input { border-color: var(--orange); background: #FFF8F0; }
    .err-msg {
      display: none; margin-top: 8px;
      background: #FFF3E0; border: 1.5px solid #FFCC80;
      border-radius: 10px; padding: 10px 14px;
      font-size: 13px; color: var(--orange); font-weight: 600;
      text-align: right; line-height: 1.5;
    }
    .err-msg.show { display: block; }
    .btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--blue), #1a56c4);
      color: var(--white); border: none; border-radius: 14px;
      font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 800;
      cursor: pointer; transition: opacity .2s; margin-top: 8px;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn:not(:disabled):active { opacity: .85; }
    .otp-section { display: none; }
    .otp-section.show { display: block; }
    .otp-input {
      text-align: center; font-size: 28px; letter-spacing: 6px;
      font-weight: 900; color: var(--blue);
    }
    .resend-row { margin-top: 14px; font-size: 13px; color: var(--gray); }
    .resend-btn {
      background: none; border: none; color: var(--blue);
      font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer; text-decoration: underline; display: none;
    }
    .resend-btn.show { display: inline; }
    .back-btn {
      background: none; border: none; color: var(--gray);
      font-family: 'Heebo', sans-serif; font-size: 13px;
      cursor: pointer; margin-top: 14px; text-decoration: underline;
      display: block; width: 100%; text-align: center;
    }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <svg width="24" height="27" viewBox="0 0 104 118" fill="none">
      <g style="fill:#FFD700;">
        <g transform="matrix(1.25,0,0,1.25,0,30.09)"><path d="M0,0 26,0 13,22.9Z"/></g>
        <g transform="matrix(1.25,0,0,1.25,0.42,30.09)"><path d="M27.4,0 16.4,19.1 32.4,19.1 32.4,31.9 8.7,31.9 0,46.6 41.8,46.6 41.8,31.9 40.4,31.9 40.4,19.1Z"/></g>
        <g transform="matrix(1.25,0,0,1.25,24.2,58.2)"><path d="M3.8,0A3.8,3.8,0,1,1,0,3.8A3.8,3.8,0,0,1,3.8,0Z"/></g>
        <g transform="matrix(1.25,0,0,1.25,34.4,57.3)"><path d="M0.2,25.8 13.6,48.8 26.9,25.8 26.9,0 21.9,0 21.9,25.8Z"/></g>
        <g transform="matrix(1.25,0,0,1.25,36.9,30)"><path d="M0.2,0 13.8,20 13.8,46.6 18.9,40.1 18.9,21 29.2,21 29.2,32.1 25.9,32.1 25.9,46.6 52.7,46.6 39.8,23.5 53.9,0 26.9,0 16,14 5.9,0Z"/></g>
        <g transform="matrix(1.25,0,0,1.25,35.2,0)"><path d="M0,23.4 13.2,0 26.9,23.4 17.4,35.9 8.4,23.4Z"/></g>
      </g>
    </svg>
    <div class="logo-text">הבית <span>הצהוב</span></div>
  </div>

  <!-- שלב 1: טלפון -->
  <div id="phoneSection">
    <h1>כניסה לאינדקס</h1>
    <p class="subtitle">אנחנו נשלח לך קוד אימות ב-SMS<br>לטלפון שרשמת בהצטרפות</p>
    <div class="form-group">
      <label>מספר טלפון</label>
      <div class="phone-row">
        <div class="phone-prefix">🇮🇱 +972</div>
        <input type="tel" id="phoneInput" placeholder="05X-XXXXXXX"
               inputmode="tel" maxlength="12"
               oninput="clearPhoneErr()" onkeydown="if(event.key==='Enter')sendOTP()"/>
      </div>
    </div>
    <div class="err-msg" id="phoneErr"></div>
    <div id="recaptcha-container"></div>
    <button class="btn" id="sendBtn" onclick="sendOTP()">שלח קוד אימות</button>
  </div>

  <!-- שלב 2: OTP -->
  <div class="otp-section" id="otpSection">
    <h1>הזן קוד אימות</h1>
    <p class="subtitle" id="otpSubtitle">נשלח קוד לטלפון שלך</p>
    <div class="form-group" style="margin-top:24px;">
      <label>קוד בן 6 ספרות</label>
      <input type="text" id="otpInput" class="otp-input"
             placeholder="• • • • • •" maxlength="6"
             inputmode="numeric" pattern="[0-9]*"
             oninput="this.value=this.value.replace(/\D/g,''); clearOtpErr()"
             onkeydown="if(event.key==='Enter')verifyOTP()"/>
    </div>
    <div class="err-msg" id="otpErr"></div>
    <button class="btn" id="verifyBtn" onclick="verifyOTP()">אמת וכנס</button>
    <div class="resend-row">
      <span id="resendTimer">שלח שוב בעוד <span id="countdown">60</span> שניות</span>
      <button class="resend-btn" id="resendBtn" onclick="resendOTP()">שלח שוב</button>
    </div>
    <button class="back-btn" onclick="goBack()">← שנה מספר טלפון</button>
  </div>
</div>

<script type="module">
import { auth, db } from './firebase-config.js';
import {
  RecaptchaVerifier, signInWithPhoneNumber, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
import {
  collection, query, where, getDocs
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

let confirmationResult = null;
let resendInterval = null;

function normalizePhone(raw) {
  const digits = raw.replace(/\D/g, '');
  if (digits.startsWith('972')) return '+' + digits;
  if (digits.startsWith('0'))   return '+972' + digits.slice(1);
  return '+972' + digits;
}

// phone in DB might be "050-1234567" — convert E.164 to that format for matching
function e164ToLocal(e164) {
  const digits = e164.replace('+972', '0');
  if (digits.length === 10) return digits.slice(0,3) + '-' + digits.slice(3);
  return digits;
}

function initRecaptcha() {
  if (window._recaptcha) return;
  window._recaptcha = new RecaptchaVerifier(auth, 'recaptcha-container', {
    size: 'invisible',
    callback: () => {}
  });
}

window.sendOTP = async function() {
  const raw = document.getElementById('phoneInput').value.trim();
  if (!raw) return showPhoneErr('נא להזין מספר טלפון');
  const phone = normalizePhone(raw);
  if (!/^\+972[5][0-9]{8}$/.test(phone)) return showPhoneErr('מספר לא תקין — נא להזין מספר סלולרי ישראלי');

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.innerHTML = 'שולח... <span class="spinner"></span>';

  try {
    initRecaptcha();
    confirmationResult = await signInWithPhoneNumber(auth, phone, window._recaptcha);
    showOTPSection(phone);
    startResendTimer();
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'שלח קוד אימות';
    window._recaptcha = null;
    if (e.code === 'auth/too-many-requests') {
      showPhoneErr('יותר מדי ניסיונות — נסה שוב מאוחר יותר');
    } else {
      showPhoneErr('שגיאה בשליחת SMS — בדוק את המספר ונסה שוב');
    }
  }
};

window.verifyOTP = async function() {
  const code = document.getElementById('otpInput').value.trim();
  if (code.length !== 6) return showOtpErr('יש להזין קוד בן 6 ספרות');

  const btn = document.getElementById('verifyBtn');
  btn.disabled = true;
  btn.innerHTML = 'מאמת... <span class="spinner"></span>';

  try {
    const result = await confirmationResult.confirm(code);
    const e164 = result.user.phoneNumber;

    // try local format (050-XXXXXXX) and E.164 (+972...)
    const localPhone = e164ToLocal(e164);
    const snap1 = await getDocs(
      query(collection(db, 'members'), where('phone', '==', localPhone), where('status', '==', 'approved'))
    );
    const snap2 = !snap1.docs.length
      ? await getDocs(query(collection(db, 'members'), where('phone', '==', e164), where('status', '==', 'approved')))
      : { docs: [] };

    const memberDoc = snap1.docs[0] || snap2.docs[0];

    if (!memberDoc) {
      await auth.signOut();
      btn.disabled = false;
      btn.textContent = 'אמת וכנס';
      // check if pending
      const snapPending = await getDocs(
        query(collection(db, 'members'), where('phone', '==', localPhone))
      );
      if (snapPending.docs.length) {
        const st = snapPending.docs[0].data().status;
        showOtpErr(st === 'pending'
          ? 'הבקשה שלך עדיין ממתינה לאישור. ברגע שתאושר תוכל להיכנס.'
          : 'הבקשה שלך נדחתה. לפרטים צור קשר עם הצוות.');
      } else {
        showOtpErr('מספר זה אינו רשום במערכת. הרשם בדף ההרשמה.');
      }
      return;
    }

    sessionStorage.setItem('hb_uid', result.user.uid);
    sessionStorage.setItem('hb_phone', e164);
    sessionStorage.setItem('hb_memberId', memberDoc.id);

    const next = new URLSearchParams(location.search).get('next') || 'home.html';
    location.href = next;

  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'אמת וכנס';
    if (e.code === 'auth/invalid-verification-code') {
      showOtpErr('קוד שגוי — בדוק שוב');
    } else if (e.code === 'auth/code-expired') {
      showOtpErr('הקוד פג תוקף — שלח קוד חדש');
    } else {
      showOtpErr('שגיאה — נסה שוב');
    }
  }
};

window.resendOTP = async function() {
  clearInterval(resendInterval);
  document.getElementById('resendBtn').classList.remove('show');
  document.getElementById('resendTimer').style.display = 'inline';
  window._recaptcha = null;
  initRecaptcha();
  const raw = document.getElementById('phoneInput').value.trim();
  try {
    confirmationResult = await signInWithPhoneNumber(auth, normalizePhone(raw), window._recaptcha);
    startResendTimer();
  } catch(e) {
    showOtpErr('שגיאה בשליחה מחדש — נסה שוב');
  }
};

window.goBack = function() {
  clearInterval(resendInterval);
  document.getElementById('otpSection').classList.remove('show');
  document.getElementById('phoneSection').style.display = 'block';
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('sendBtn').textContent = 'שלח קוד אימות';
  document.getElementById('otpInput').value = '';
  window._recaptcha = null;
};

window.clearPhoneErr = () => {
  document.getElementById('phoneErr').classList.remove('show');
  document.getElementById('phoneInput').classList.remove('error-input');
};
window.clearOtpErr = () => {
  document.getElementById('otpErr').classList.remove('show');
  document.getElementById('otpInput').classList.remove('error-input');
};

function showPhoneErr(msg) {
  const el = document.getElementById('phoneErr');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('phoneInput').classList.add('error-input');
}
function showOtpErr(msg) {
  const el = document.getElementById('otpErr');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('otpInput').classList.add('error-input');
}
function showOTPSection(phone) {
  document.getElementById('phoneSection').style.display = 'none';
  document.getElementById('otpSection').classList.add('show');
  document.getElementById('otpSubtitle').textContent = 'נשלח קוד ל-' + phone;
  document.getElementById('otpInput').focus();
}
function startResendTimer() {
  let secs = 60;
  document.getElementById('countdown').textContent = secs;
  document.getElementById('resendTimer').style.display = 'inline';
  document.getElementById('resendBtn').classList.remove('show');
  resendInterval = setInterval(() => {
    secs--;
    document.getElementById('countdown').textContent = secs;
    if (secs <= 0) {
      clearInterval(resendInterval);
      document.getElementById('resendTimer').style.display = 'none';
      document.getElementById('resendBtn').classList.add('show');
    }
  }, 1000);
}

// אם כבר מחובר — דלג ישר
onAuthStateChanged(auth, user => {
  if (user && sessionStorage.getItem('hb_memberId')) {
    const next = new URLSearchParams(location.search).get('next') || 'home.html';
    location.href = next;
  }
});
</script>
</body>
</html>
