<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>מיגרציה חד-פעמית — הבית הצהוב</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Heebo', sans-serif; background: #002a75; min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border-radius: 20px; padding: 32px 28px; max-width: 480px; width: 100%; box-shadow: 0 8px 40px rgba(0,0,0,.3); }
    h1 { font-size: 20px; font-weight: 900; color: #003DA5; margin-bottom: 6px; }
    .sub { font-size: 13px; color: #888; margin-bottom: 24px; }
    .log { background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 14px; font-size: 12px; color: #444; line-height: 1.9; min-height: 120px; max-height: 280px; overflow-y: auto; font-family: monospace; white-space: pre-wrap; margin-bottom: 20px; }
    .btn { display: block; width: 100%; padding: 14px; background: linear-gradient(135deg, #003DA5, #1a56c4); color: #fff; border: none; border-radius: 12px; font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 800; cursor: pointer; text-align: center; text-decoration: none; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .status { text-align: center; font-size: 13px; color: #666; margin-top: 12px; }
    .done { color: #16a34a; font-weight: 700; }
  </style>
</head>
<body>
<div class="card">
  <h1>👥 מיגרציה חד-פעמית</h1>
  <p class="sub">יצירת accessToken לכל עסק + העברת בעלי עסקים לרשימת האוהדים</p>
  <div class="log" id="log">מתחיל בדיקה...</div>
  <button class="btn" id="backBtn" href="admin-businesses.html" onclick="location.href='admin-businesses.html'" disabled>‹ חזרה לניהול עסקים</button>
  <div class="status" id="status"></div>
</div>

<script type="module">
import { db } from './firebase-config.js';
import {
  collection, getDocs, addDoc, updateDoc, doc, query, where, serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const logEl    = document.getElementById('log');
const statusEl = document.getElementById('status');
const backBtn  = document.getElementById('backBtn');

function log(msg) {
  logEl.textContent += msg + '\n';
  logEl.scrollTop = logEl.scrollHeight;
}

async function run() {
  log('⏳ טוען עסקים מ-Firestore...');

  const bizSnap = await getDocs(collection(db, 'businesses'));
  const businesses = bizSnap.docs.map(d => ({ id: d.id, ...d.data() }))
    .filter(b => b.ownerEmail);

  log(`נמצאו ${businesses.length} עסקים עם אימייל.\n`);

  // שלב 0: הוספת accessToken לעסקים שאין להם
  log('⏳ מוסיף accessToken לעסקים ללא טוקן...');
  let tokensAdded = 0;
  for (const b of bizSnap.docs) {
    if (!b.data().accessToken) {
      try {
        await updateDoc(doc(db, 'businesses', b.id), {
          accessToken: crypto.randomUUID()
        });
        tokensAdded++;
      } catch(e) { log(`❌ שגיאה בטוקן ${b.id}: ${e.message}`); }
    }
  }
  log(`✅ נוספו ${tokensAdded} טוקנים חדשים.\n`);

  let added = 0, skipped = 0, errors = 0;

  for (const b of businesses) {
    const email = (b.ownerEmail || '').trim().toLowerCase();
    if (!email) { skipped++; continue; }

    try {
      const existing = await getDocs(
        query(collection(db, 'members'), where('email', '==', email))
      );

      if (!existing.empty) {
        log(`↩ דלג — ${b.name || b.ownerFirst}: כבר קיים ב-members`);
        skipped++;
        continue;
      }

      await addDoc(collection(db, 'members'), {
        firstName:         b.ownerFirst  || '',
        lastName:          b.ownerLast   || '',
        phone:             b.ownerPhone  || '',
        email:             email,
        isSubscriber:      b.isSubscriber === 'yes',
        subscriberSection: b.isSubscriber === 'yes' ? (b.gate   || null) : null,
        subscriberNumber:  b.isSubscriber === 'yes' ? (b.subNum || null) : null,
        facebookUrl:       b.fbUrl || null,
        isBusinessOwner:   true,
        status:            b.status === 'approved' ? 'approved' : 'pending',
        submittedAt:       serverTimestamp(),
        familyMembers:     [],
      });

      log(`✅ נוסף — ${b.name || b.ownerFirst} (${email})`);
      added++;
    } catch(e) {
      log(`❌ שגיאה — ${b.name}: ${e.message}`);
      errors++;
    }
  }

  log(`\n━━━━━━━━━━━━━━━━━━━━━`);
  log(`סיום! נוספו: ${added} · דולגו: ${skipped} · שגיאות: ${errors}`);
  statusEl.innerHTML = `<span class="done">✅ המיגרציה הושלמה — ניתן לסגור דף זה</span>`;
  backBtn.disabled = false;
}

run().catch(e => {
  log('❌ שגיאה קריטית: ' + e.message);
  backBtn.disabled = false;
});
</script>
</body>
</html>
