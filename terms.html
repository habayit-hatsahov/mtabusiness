<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מדיניות לאוהדים ותקנון — הבית הצהוב</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --yellow:    #FFDE00;
      --yellow-dk: #D4B800;
      --bg:        #151C2E;
      --nav-bg:    #0f1524;
      --card-bg:   #1a2440;
      --border:    rgba(255,255,255,0.07);
      --border-md: rgba(255,255,255,0.14);
      --text:      #FFFFFF;
      --text-sm:   rgba(255,255,255,0.5);
      --text-muted:rgba(255,255,255,0.32);
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; padding-bottom: 80px; }
    ::-webkit-scrollbar { width: 0; }

    /* ══ TOP NAV ══ */
    .top-nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--nav-bg);
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .nav-logo-text { color: var(--text); font-size: 18px; font-weight: 900; }
    .nav-logo-text span { color: var(--yellow); }
    .nav-page-title { font-size: 14px; font-weight: 700; color: var(--text-sm); }

    /* ══ BOTTOM NAV ══ */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--nav-bg); border-top: 1px solid var(--border);
      display: flex; padding: 10px 0 18px; z-index: 200;
    }
    .bottom-nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; gap: 3px; cursor: pointer; text-decoration: none;
    }
    .bottom-nav-icon { font-size: 22px; }
    .bottom-nav-label { font-size: 10px; font-weight: 700; color: var(--text-muted); font-family: 'Heebo', sans-serif; }
    .bottom-nav-item.active .bottom-nav-label { color: var(--yellow); }

    /* ══ CONTENT ══ */
    .container { max-width: 680px; margin: 0 auto; padding: 20px 16px 24px; }

    .page-header {
      margin-bottom: 20px;
    }
    .page-header h1 { font-size: 22px; font-weight: 900; color: var(--text); margin-bottom: 4px; }
    .page-header p { font-size: 13px; color: var(--text-muted); }

    .terms-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 22px 20px;
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }

    .terms-intro {
      font-size: 14px;
      color: var(--text-sm);
      line-height: 1.85;
    }

    h2 {
      font-size: 14px;
      font-weight: 800;
      color: var(--yellow);
      margin: 24px 0 8px;
    }
    h2:first-of-type { margin-top: 20px; }

    p {
      font-size: 14px;
      color: var(--text-sm);
      line-height: 1.85;
      margin-bottom: 10px;
    }

    ul { padding-right: 18px; margin-bottom: 10px; }
    ul li {
      font-size: 14px;
      color: var(--text-sm);
      line-height: 1.85;
      margin-bottom: 8px;
    }

    strong { color: var(--text); }

    .terms-footer {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      padding: 12px 0 4px;
    }
    .terms-footer strong { color: var(--yellow); }
  </style>
</head>
<body>

<!-- TOP NAV -->
<header class="top-nav">
  <a href="home.html" class="nav-logo">
    <span class="nav-logo-text">הבית <span>הצהוב</span></span>
  </a>
  <span class="nav-page-title">מדיניות לאוהדים ותקנון</span>
</header>

<div class="container">

  <div class="page-header">
    <h1>מדיניות לאוהדים ותקנון</h1>
    <p>הבית הצהוב — אינדקס העסקים של האוהדים</p>
  </div>

  <div class="terms-card" id="termsContent">
  </div>

  <div class="terms-footer">
    <strong>הבית הצהוב</strong> · קהילת אוהדי מכבי · כל הזכויות שמורות © 2025
  </div>

</div>

<script>
const DEFAULT_TERMS_FAN = `## 1. מהות האתר והשירות
פלטפורמת תיווך והצגה בלבד: האתר משמש כאינדקס וכלוח מודעות קהילתי שמטרתו להציג עסקים ונותני שירות בבעלות או בניהול של אוהדי הקבוצה, חבריהם ובני משפחתם.
אי-תלות בעסקאות: האתר אינו צד, במישרין או בעקיפין, לכל התקשרות, עסקה, רכישה, חוזה או הבנה בין המשתמש לבין מי מהעסקים המופיעים באתר.

## 2. הגבלת אחריות והסרת אחריות מוחלטת
"הבית הצהוב", מפעילת האתר, מנהליו, וכן בעלי העסקים ונותני השירות המפרסמים בו, אינם נושאים ולא יישאו בכל אחריות מכל סוג שהוא לגבי הרכישות או הגלישה.
טיב השירות והמוצרים: אין לאתר כל אחריות על איכות, טיב, חוקיות, בטיחות, או אספקה של המוצרים או השירותים המוצעים על ידי העסקים המופיעים באינדקס.
נזקים ישירים או עקיפים: האתר ובעליו לא יהיו אחראים לכל נזק, הפסד, עוגמת נפש או פגיעה שייגרמו למשתמש כתוצאה מהסתמכות על המידע באתר.
סכסוכים בין משתמשים לעסקים: בכל מקרה של מחלוקת, המשתמש פוטר באופן מוחלט את האתר מכל אחריות.

## 3. מדיניות רישום, סינון ואישור עסקים
אישור ידני ומותנה: הגשת בקשה לרישום עסק באתר אינה מהווה אישור אוטומטי לפרסומו.
זכות סינון מוחלטת: הנהלת האתר שומרת לעצמה את הזכות המלאה לקבוע מי רשאי להופיע באינדקס, בכל עת ומכל סיבה שהיא.
עדכון והסרת תכנים: מנהלי האתר רשאים להסיר פרסום של עסק קיים באופן מיידי במידה ויעלה חשש כי המידע אינו מדויק.

## 4. נכונות המידע ואמינות הפרסומים
המידע על העסקים נמסר לאתר על ידי בעלי העסקים עצמם. האתר אינו בודק את אמיתות המידע, רישיונות העסק, או יושרתם. האחריות הבלעדית לבדיקת העסק חלה על המשתמש בלבד.

## 5. התנהגות משתמשים וקהילתיות
האתר הוקם מתוך רוח קהילתית ועזרה הדדית בין אוהדים. המשתמש מתחייב שלא לעשות שימוש באתר למטרות לא חוקיות, פגיעה בפרטיות, הטעיה, או פרסום תכנים פוגעניים.

## 6. קניין רוחני
כל הזכויות בעיצוב האתר, קוד המקור, סימני המסחר, הלוגו והטקסטים המקוריים שייכים בלעדית ל"הבית הצהוב".

## 7. שינויים באתר ובתנאי השימוש
מנהלי האתר שומרים לעצמם את הזכות לערוך, לשנות, להוסיף או להסיר עסקים מהאינדקס בכל עת, ללא הודעה מוקדמת.
תנאים אלו עשויים להתעדכן מעת לעת. הגרסה המופיעה באתר היא הגרסה המחייבת.

## 8. סמכות שיפוט
על תנאים אלו יחולו אך ורק דיני מדינת ישראל. מקום השיפוט הבלעדי: בתי המשפט המוסמכים במחוז תל אביב-יפו.`;

function renderTerms(raw, container) {
  container.innerHTML = '';
  raw.split('\n').forEach(line => {
    const trimmed = line.trim();
    if (!trimmed) return;
    if (trimmed.startsWith('## ')) {
      const h = document.createElement('h2');
      h.textContent = trimmed.slice(3);
      container.appendChild(h);
    } else {
      const p = document.createElement('p');
      p.textContent = trimmed;
      container.appendChild(p);
    }
  });
}

const content = localStorage.getItem('_hb_tpl_terms_fan') || DEFAULT_TERMS_FAN;
renderTerms(content, document.getElementById('termsContent'));
</script>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a class="bottom-nav-item" href="home.html">
    <span class="bottom-nav-icon">🏠</span>
    <span class="bottom-nav-label">בית</span>
  </a>

    <span class="bottom-nav-label">חיפוש</span>

    <span class="bottom-nav-icon">📍</span>
    <span class="bottom-nav-label">קרוב אליך</span>
  </a>
  <a class="bottom-nav-item" href="profile.html">
    <span class="bottom-nav-icon">👤</span>
    <span class="bottom-nav-label">פרופיל</span>
  </a>
</nav>

</body>
</html>
