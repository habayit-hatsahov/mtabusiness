<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yellow Zone – ניהול עסקים</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 10px; }

    :root {
      --yellow:     #FFDE00;
      --yellow-dark:#D4B800;
      --blue:       #003DA5;
      --blue-dark:  #002a75;
      --blue-mid:   #1a56c4;
      --white:      #FFFFFF;
      --bg:         #151C2E;
      --nav-bg:     #0f1524;
      --card-bg:    #1a2440;
      --card-bg2:   #1e2b47;
      --border:     rgba(255,255,255,0.07);
      --border-md:  rgba(255,255,255,0.14);
      --text:       #FFFFFF;
      --text-sm:    rgba(255,255,255,0.5);
      --text-muted: rgba(255,255,255,0.32);
      --gray:       var(--text-muted);
      --green:      #25D366;
      --green-bg:   rgba(37,211,102,.15);
      --orange:     #d97706;
      --orange-bg:  rgba(217,119,6,.18);
      --slate:      var(--text-sm);
      --slate-bg:   rgba(255,255,255,.08);
      --radius:     14px;
      --shadow:     0 2px 16px rgba(0,0,0,0.35);
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    /* ── TOP BAR ── */
    .topbar {
      background: var(--nav-bg);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,.75);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 8px;
      transition: background .15s, color .15s;
      white-space: nowrap;
    }

    .back-btn:hover { background: rgba(255,255,255,.12); color: var(--white); }

    .topbar-title { flex: 1; color: var(--white); font-size: 17px; font-weight: 800; }
    .topbar-title span { color: var(--yellow); }

    /* ── LAYOUT ── */
    .page { max-width: 860px; margin: 0 auto; padding: 24px 16px 60px; }

    /* ── STATS ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 16px;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .stat-card .num { font-size: 32px; font-weight: 900; color: var(--blue); line-height: 1; }
    .stat-card .lbl { font-size: 12px; color: var(--gray); margin-top: 4px; }
    .stat-card.pending  .num { color: var(--orange); }
    .stat-card.approved .num { color: var(--green); }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: 2px solid var(--border-md);
      background: var(--card-bg);
      font-family: 'Heebo', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-sm);
      cursor: pointer;
      transition: all .15s;
    }

    .filter-btn.active { background: rgba(255,222,0,.15); border-color: var(--yellow); color: var(--yellow); }
    .filter-changes { border-color: rgba(217,119,6,.4); color: #fbbf24; background: var(--orange-bg); }
    .filter-changes.active { background: rgba(217,119,6,.9); border-color: #d97706; color: #1a1a1a; }

    /* ── MAIN TABS ── */
    .main-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .main-tab {
      flex: 1; padding: 10px; border-radius: 10px; border: 1.5px solid var(--border-md);
      background: var(--card-bg); font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 800;
      color: var(--text-sm); cursor: pointer; transition: all .15s;
    }
    .main-tab.active { background: rgba(255,222,0,.15); border-color: var(--yellow); color: var(--yellow); }

    /* ── SECTIONS TABLE ── */
    .sections-table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
    .sections-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .sections-table th {
      text-align: right; padding: 10px 10px; color: var(--text-sm); font-size: 11px;
      font-weight: 700; border-bottom: 1.5px solid var(--border); white-space: nowrap; background: var(--slate-bg);
    }
    .sections-table td { padding: 10px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .sections-table tr:last-child td { border-bottom: none; }
    .sections-table td:first-child { font-weight: 700; color: var(--text); white-space: nowrap; }
    .sec-cell { display: flex; flex-direction: column; gap: 6px; align-items: flex-start; min-width: 128px; }
    .sec-badge-ro { font-size: 11px; padding: 3px 9px; border-radius: 10px; background: rgba(255,255,255,.08); color: var(--text-sm); white-space: nowrap; }
    .sec-badge-ro.on { background: rgba(37,211,102,.15); color: #25D366; }
    .sec-active-line { font-size: 11px; color: var(--yellow); display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .sec-mini-btn {
      background: none; border: 1px solid var(--border-md); color: var(--text-sm); border-radius: 6px;
      font-size: 10px; padding: 2px 7px; cursor: pointer; font-family: 'Heebo', sans-serif;
    }
    .sec-mini-btn:hover { border-color: var(--orange); color: var(--orange); }
    .sec-setup-row { display: flex; align-items: center; gap: 5px; }
    .sec-days-input {
      width: 46px; background: var(--slate-bg); border: 1px solid var(--border-md); border-radius: 6px;
      color: var(--text); font-family: 'Heebo', sans-serif; font-size: 11px; padding: 4px 5px; text-align: center;
    }
    .sec-activate-btn {
      background: var(--yellow); color: #151C2E; border: none; border-radius: 6px; font-size: 10px;
      font-weight: 800; padding: 5px 9px; cursor: pointer; font-family: 'Heebo', sans-serif; white-space: nowrap;
    }
    .changes-badge {
      display: inline-flex; align-items: center; justify-content: center;
      background: #d97706; color: #fff;
      font-size: 11px; font-weight: 800;
      min-width: 18px; height: 18px; border-radius: 9px;
      padding: 0 4px; margin-right: 2px;
    }
    .filter-changes.active .changes-badge { background: #1a1a1a; color: #fbbf24; }

    .search-box {
      flex: 1;
      min-width: 160px;
      padding: 7px 14px;
      border: 2px solid var(--border-md);
      border-radius: 20px;
      font-family: 'Heebo', sans-serif;
      font-size: 13px;
      outline: none;
      background: var(--nav-bg);
      color: var(--text);
    }

    .search-box:focus { border-color: var(--yellow); }

    /* ── BIZ LIST (row style, like the sections table) ── */
    #bizList { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .biz-card {
      background: var(--card-bg);
      border: none;
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      border-right: 3px solid transparent;
      transition: background .15s, border-color .2s;
    }
    .biz-card:last-child { border-bottom: none; }
    .biz-card:hover { background: rgba(255,255,255,.03); }

    .biz-card.pending  { border-right-color: var(--orange); }
    .biz-card.approved { border-right-color: var(--green); }
    .biz-card.rejected { border-right-color: var(--border-md); opacity: .6; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 14px;
      cursor: pointer;
      user-select: none;
    }

    .biz-avatar {
      width: 28px; height: 28px;
      border-radius: 7px;
      background: linear-gradient(135deg, var(--yellow), var(--yellow-dark));
      color: var(--blue-dark);
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .card-info { flex: 1; min-width: 0; display: flex; align-items: center; gap: 10px; }
    .card-name { font-size: 13px; font-weight: 700; white-space: nowrap; color: var(--text); }
    .card-meta { font-size: 12px; color: var(--text-sm); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 8px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .chip.fresh    { background: rgba(37,211,102,.18); color: #86efac; border: 1px solid rgba(37,211,102,.35); }
    .chip.medium   { background: var(--orange-bg); color: #fbbf24; border: 1px solid rgba(217,119,6,.4); }
    .chip.long     { background: rgba(239,68,68,.18); color: #fca5a5; border: 1px solid rgba(239,68,68,.35); }
    .chip.approved      { background: var(--green-bg); color: var(--green); }
    .chip.rejected      { background: var(--slate-bg); color: var(--slate); border: 1px solid var(--border-md); }
    /* צבע אגרסיבי בכוונה — עסק עם שינוי ממתין צריך לבלוט מיד ברשימה, לא להתערבב עם שאר הצ'יפים העדינים */
    .chip.pending-edit  {
      background: #dc2626; color: #fff; border: 1px solid #dc2626; font-weight: 800;
      animation: pendingPulse 1.6s ease-in-out infinite;
    }
    @keyframes pendingPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,.55); }
      50%      { box-shadow: 0 0 0 5px rgba(220,38,38,0); }
    }

    .pending-section { background: rgba(234,179,8,.1); border: 2px solid rgba(234,179,8,.35); border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; }
    .pending-title { font-size: 13px; font-weight: 800; color: var(--yellow); margin-bottom: 10px; }
    .pending-row { display: grid; grid-template-columns: 58px 100px 1fr auto 1fr; align-items: center; gap: 6px; font-size: 12px; padding: 5px 0; border-bottom: 1px solid rgba(234,179,8,.35); }
    .pending-row:last-of-type { border-bottom: none; }
    .pending-step {
      font-size: 10px; font-weight: 800; color: #0f1524; background: var(--yellow);
      border-radius: 20px; padding: 3px 7px; text-align: center; white-space: nowrap;
    }
    .pending-step:empty { background: none; padding: 0; }
    .pending-step[onclick] { cursor: pointer; }
    .pending-step[onclick]:hover { filter: brightness(1.1); }
    .pending-field { font-weight: 700; color: var(--yellow); }
    .pending-old { color: var(--text-muted); text-decoration: line-through; }
    .pending-arrow { color: var(--yellow); font-weight: 700; }
    .pending-new { color: #86efac; font-weight: 700; }
    .pending-actions { display: flex; gap: 8px; margin-top: 12px; }
    .btn-pending-approve { flex: 1; background: #16a34a; color: #fff; border: none; border-radius: 8px; padding: 8px; font-family: 'Heebo',sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }
    .btn-pending-reject  { flex: 1; background: var(--nav-bg); color: var(--yellow); border: 1.5px solid rgba(234,179,8,.35); border-radius: 8px; padding: 8px; font-family: 'Heebo',sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }
    .btn-pending-edit    { flex: 1; background: var(--card-bg); color: var(--yellow); border: 1.5px solid rgba(234,179,8,.35); border-radius: 8px; padding: 8px; font-family: 'Heebo',sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }
    .pending-edit-input  { width: 100%; background: var(--nav-bg); border: 1.5px solid var(--yellow); border-radius: 6px; color: #86efac; font-family: 'Heebo',sans-serif; font-size: 12px; font-weight: 700; padding: 4px 8px; }
    .dash-mini-wrap { display: inline-flex; align-items: center; gap: 5px; flex-shrink: 0; vertical-align: middle; margin-right: 6px; }
    .dash-mini-link {
      background: rgba(59,130,246,.15); color: #93c5fd; border: 1px solid rgba(59,130,246,.3); border-radius: 7px;
      padding: 4px 10px; font-size: 11px; font-weight: 700; text-decoration: none; white-space: nowrap;
    }
    .dash-mini-copy {
      background: rgba(59,130,246,.15); border: 1px solid rgba(59,130,246,.3); border-radius: 7px;
      padding: 4px 7px; font-size: 11px; cursor: pointer; line-height: 1;
    }

    .sections-status-block { border-top: none !important; padding-top: 0 !important; }
    .sections-status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 4px; }
    .sec-status-item { background: var(--slate-bg); border-radius: 10px; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .sec-status-label { font-size: 11px; font-weight: 700; color: var(--text-sm); }
    @media (max-width: 480px) { .sections-status-grid { grid-template-columns: 1fr; } }

    .pill {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .pill.cat      { background: rgba(0,61,165,.25); color: #8fb8ff; border: 1px solid rgba(0,61,165,.4); }
    .pill.discount { background: rgba(234,179,8,.18); color: #fde047; border: 1px solid rgba(234,179,8,.35); }
    .pill.nodiscount { background: var(--slate-bg); color: var(--text-sm); }

    .chevron { color: var(--text-muted); font-size: 16px; transition: transform .2s; flex-shrink: 0; }

    /* ── CARD BODY ── */
    .card-body { display: none; padding: 0 18px 18px; border-top: 1px solid var(--border); }
    .card-body.open { display: block; }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 16px;
      margin: 16px 0;
    }

    .detail-item .lbl { font-size: 11px; color: var(--text-sm); font-weight: 500; margin-bottom: 2px; }
    .detail-item .val { font-size: 14px; font-weight: 600; word-break: break-all; color: var(--text); }
    .detail-item.full { grid-column: 1 / -1; }
    .detail-item .val.desc { font-weight: 400; font-size: 13px; line-height: 1.5; }

    .cat-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 8px;
      background: rgba(0,61,165,.25);
      color: #8fb8ff;
      border: 1px solid rgba(0,61,165,.4);
      margin: 2px 2px 0 0;
    }

    .discount-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 8px;
      background: rgba(234,179,8,.18);
      color: #fde047;
      border: 1px solid rgba(234,179,8,.35);
    }

    .benefit-box {
      background: rgba(255,222,0,.08);
      border: 1.5px solid rgba(255,222,0,.3);
      border-radius: 12px;
      padding: 12px 14px;
    }
    .benefit-box-label { font-size: 11px; font-weight: 700; color: var(--yellow); letter-spacing: .3px; margin-bottom: 6px; }
    .benefit-box-text { font-size: 14px; font-weight: 800; color: var(--text); }
    .benefit-box-meta { font-size: 12px; color: var(--text-sm); margin-top: 6px; }
    .benefit-box .missing { font-size: 13px; }
    .add-benefit-btn {
      width: 100%; margin-top: 14px; padding: 10px;
      border-radius: 10px; border: 1.5px dashed rgba(255,222,0,.4);
      background: transparent; color: var(--yellow);
      font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all .15s;
    }
    .add-benefit-btn:hover { background: rgba(255,222,0,.08); }
    .remove-benefit-link {
      font-size: 11px; color: var(--text-muted); cursor: pointer;
      text-decoration: underline; margin-top: 12px; display: inline-block;
    }

    .ver-tag {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 8px;
    }

    .ver-tag.subscriber { background: rgba(59,130,246,.18); color: #93c5fd; border: 1px solid rgba(59,130,246,.35); }
    .ver-tag.photo      { background: rgba(37,211,102,.18); color: #86efac; border: 1px solid rgba(37,211,102,.35); }

    /* ── ACTIONS ── */
    .card-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .btn {
      flex: 1;
      min-width: 100px;
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      font-family: 'Heebo', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:active { transform: scale(.97); }

    .btn-approve { background: linear-gradient(135deg, #16a34a, #15803d); color: var(--white); box-shadow: 0 4px 12px rgba(22,163,74,.3); }
    .btn-reject  { background: rgba(255,255,255,.08); color: var(--text-sm); }
    .btn-wa      { background: linear-gradient(135deg, #25D366, #128C7E); color: var(--white); box-shadow: 0 4px 12px rgba(37,211,102,.3); }
    .btn-mail    { background: linear-gradient(135deg, var(--blue), var(--blue-mid)); color: var(--white); box-shadow: 0 4px 12px rgba(0,61,165,.25); }
    .btn-undo    { background: rgba(255,255,255,.08); color: var(--text-sm); font-size: 12px; flex: none; min-width: auto; padding: 8px 12px; }

    /* ── EMPTY ── */
    .empty-state { text-align: center; padding: 48px 20px; color: var(--text-sm); }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      padding: 28px 24px 40px;
      width: 100%;
      max-width: 520px;
      animation: slideUp .3s ease;
    }

    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .modal h3 { font-size: 20px; font-weight: 800; color: var(--yellow); margin-bottom: 4px; }
    .modal-sub { font-size: 13px; color: var(--text-sm); margin-bottom: 20px; }
    .modal-label { font-size: 12px; font-weight: 700; color: var(--yellow); margin-bottom: 6px; margin-top: 14px; }

    .msg-preview {
      background: var(--nav-bg);
      border: 1px solid var(--border-md);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 13px;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
    }

    textarea.msg-edit {
      width: 100%;
      background: var(--nav-bg);
      border: 2px solid var(--border-md);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: 'Heebo', sans-serif;
      font-size: 13px;
      line-height: 1.75;
      color: var(--text);
      resize: vertical;
      min-height: 120px;
      outline: none;
      transition: border-color .15s;
      direction: rtl;
    }

    textarea.msg-edit:focus { border-color: var(--yellow); }

    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

    /* ── VIEW SHEET ── */
    .view-sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 250;
      align-items: flex-end;
      justify-content: center;
    }
    .view-sheet-overlay.open { display: flex; }
    .view-sheet {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 640px;
      max-height: 92dvh;
      overflow-y: auto;
      animation: slideUp .3s ease;
      display: flex;
      flex-direction: column;
    }
    .view-sheet-header {
      position: sticky;
      top: 0;
      background: var(--card-bg);
      z-index: 10;
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .view-sheet-header .biz-avatar { font-size: 28px; flex-shrink: 0; }
    .view-sheet-title { font-size: 18px; font-weight: 800; color: var(--yellow); }
    .view-sheet-meta  { font-size: 12px; color: var(--text-sm); margin-top: 2px; }
    .view-sheet-close {
      margin-right: auto;
      background: rgba(255,255,255,.08);
      border: none;
      border-radius: 50%;
      width: 34px;
      height: 34px;
      font-size: 18px;
      cursor: pointer;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .view-sheet-body { padding: 0 20px 32px; }
    .view-sheet-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      position: sticky;
      bottom: 0;
      background: var(--card-bg);
    }

    .form-row {
      margin-bottom: 14px;
    }

    .form-row label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--yellow);
      margin-bottom: 5px;
    }

    .form-row input,
    .form-row textarea,
    .form-row select {
      width: 100%;
      padding: 10px 13px;
      border: 2px solid var(--border-md);
      border-radius: 10px;
      font-family: 'Heebo', sans-serif;
      font-size: 14px;
      outline: none;
      background: var(--nav-bg);
      color: var(--text);
      transition: border-color .15s;
    }

    .form-row input:focus,
    .form-row textarea:focus,
    .form-row select:focus { border-color: var(--yellow); }

    .form-row textarea { resize: vertical; min-height: 80px; }

    .form-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--slate-bg);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 14px;
    }

    .toggle-row label { font-size: 14px; font-weight: 600; color: var(--text); margin: 0; }

    .toggle {
      width: 44px; height: 24px;
      background: rgba(255,255,255,.15);
      border-radius: 12px;
      position: relative;
      cursor: pointer;
      transition: background .2s;
      border: none;
      flex-shrink: 0;
    }

    .toggle.on { background: var(--green); }

    .toggle::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      background: var(--white);
      border-radius: 50%;
      top: 3px; right: 3px;
      transition: transform .2s;
      box-shadow: 0 1px 4px rgba(0,0,0,.2);
    }

    .toggle.on::after { transform: translateX(-20px); }

    .btn-delete { background: var(--orange-bg); color: var(--orange); font-size: 12px; flex: none; min-width: auto; padding: 8px 12px; }

    /* ── CARD SECTIONS ── */
    .card-section {
      padding: 10px 0 4px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }
    .card-section:first-child { border-top: none; padding-top: 4px; }
    .card-section-title {
      font-size: 13px; font-weight: 800; letter-spacing: .2px;
      color: var(--yellow); background: rgba(255,222,0,.1); border: 1px solid rgba(255,222,0,.2); border-radius: 8px;
      padding: 8px 12px; margin-bottom: 12px; margin-top: 4px;
      display: flex; align-items: center; justify-content: space-between; gap: 6px;
    }
    .sec-edit-btn {
      background: rgba(0,61,165,.25); color: var(--yellow); border: none; border-radius: 7px;
      padding: 4px 10px; font-family: 'Heebo', sans-serif; font-size: 11px; font-weight: 700;
      cursor: pointer; flex-shrink: 0;
    }
    .sec-edit-form { display: none; margin-top: 4px; }
    .sec-edit-form.open { display: block; }
    .detail-grid.hidden-when-edit { display: none; }
    .val.missing, span.missing { color: var(--text-muted); font-style: italic; font-weight: 400; font-size: 12px; }
    .field-tag {
      display: inline-block; font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 6px; margin: 1px 2px 1px 0;
    }
    .field-tag.cat     { background: rgba(0,61,165,.25); color: #8fb8ff; }
    .field-tag.tagname { background: transparent; border: 1px solid rgba(0,61,165,.4); color: #8fb8ff; }
    .field-tag.type    { background: rgba(37,211,102,.18); color: #86efac; }
    .field-tag.region  { background: rgba(234,179,8,.18); color: #fde047; }

    .tag-suggestion-alert {
      display: block; width: 100%;
      background: var(--orange-bg); border: 1.5px solid rgba(217,119,6,.4);
      border-radius: 10px; padding: 8px 12px;
      color: var(--orange); font-size: 12px; font-weight: 600;
    }

    .edit-section-title {
      font-size: 13px; font-weight: 800; color: var(--yellow);
      margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
    }
    .edit-btn-row { display: flex; gap: 10px; margin-top: 20px; }

    /* ── MEDIA UPLOAD ── */
    .edit-upload-zone {
      border: 2px dashed var(--border-md); border-radius: 12px;
      padding: 18px 14px; text-align: center; cursor: pointer;
      background: rgba(255,255,255,.03); position: relative; transition: all .2s;
      margin-bottom: 14px;
    }
    .edit-upload-zone:hover { border-color: var(--yellow); background: rgba(255,222,0,.08); }
    .edit-upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 1; }
    .edit-upload-icon { font-size: 26px; }
    .edit-upload-text { font-size: 13px; font-weight: 600; color: var(--yellow); margin-top: 4px; }
    .edit-upload-sub  { font-size: 11px; color: var(--text-sm); margin-top: 2px; }

    .edit-logo-preview {
      display: none; position: relative; width: 72px; height: 72px;
      margin: 0 auto 4px;
    }
    .edit-logo-preview img {
      width: 72px; height: 72px; border-radius: 10px; object-fit: cover;
    }
    .edit-cover-preview {
      display: none; position: relative; width: 100%; max-width: 220px; height: 110px;
      margin: 0 auto 4px;
    }
    .edit-cover-preview img {
      width: 100%; height: 100%; border-radius: 10px; object-fit: cover;
    }
    .thumb-download-btn {
      position: absolute; bottom: 4px; left: 4px; z-index: 2;
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(0,0,0,.55); border: none; color: #fff;
      font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .thumb-download-btn:hover { background: rgba(0,0,0,.75); }
    .img-lightbox-overlay {
      display: none; position: fixed; inset: 0; z-index: 600;
      background: rgba(0,0,0,.88);
      align-items: center; justify-content: center; padding: 40px 16px;
    }
    .img-lightbox-overlay.open { display: flex; }
    .img-lightbox-overlay img { max-width: 100%; max-height: 100%; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
    .lightbox-close-btn, .lightbox-dl-btn {
      position: fixed; top: 16px; z-index: 601;
      height: 40px; border-radius: 20px; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700;
    }
    .lightbox-close-btn { left: 16px; width: 40px; background: rgba(255,255,255,.15); color: #fff; font-size: 18px; }
    .lightbox-dl-btn { right: 16px; padding: 0 18px; background: var(--yellow); color: #0f1524; }
    .lightbox-nav-btn {
      display: none; position: fixed; top: 50%; transform: translateY(-50%); z-index: 601;
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3);
      color: #fff; font-size: 24px; cursor: pointer;
      align-items: center; justify-content: center;
      direction: ltr; /* מונע mirroring אוטומטי של ‹ › בהקשר RTL */
    }
    .lightbox-nav-btn.prev { left: 16px; }
    .lightbox-nav-btn.next { right: 16px; }
    .media-missing-note {
      background: var(--orange-bg); border: 1.5px solid rgba(217,119,6,.4);
      border-radius: 10px; padding: 10px 12px; margin-bottom: 12px;
      font-size: 12px; color: #fbbf24; font-weight: 600; line-height: 1.5;
    }
    .media-empty-slot {
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
      border: 2px dashed rgba(217,119,6,.45); border-radius: 12px;
      background: var(--orange-bg);
      color: #fbbf24; font-size: 10px; font-weight: 600; text-align: center; padding: 4px;
    }
    .media-empty-slot .icon { font-size: 22px; opacity: .7; }
    .edit-media-pair-row { display: flex; gap: 10px; }
    .edit-media-pair-row > div { flex: 1; min-width: 0; }
    .edit-media-pair-label { font-size: 11px; color: var(--text-sm); font-weight: 600; margin-bottom: 6px; }
    .edit-media-pair-row .edit-upload-zone { padding: 12px 6px; }
    .edit-media-pair-row .edit-cover-preview { max-width: 100%; height: 72px; }
    .edit-media-pair-row .edit-upload-icon { font-size: 20px; }
    .edit-media-pair-row .edit-upload-text { font-size: 11px; }
    .edit-media-pair-row .edit-upload-sub { font-size: 10px; }
    .edit-logo-remove {
      position: absolute; top: -6px; left: -6px;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--orange); color: #fff; border: none; cursor: pointer;
      font-size: 11px; font-weight: 800; z-index: 2;
      display: flex; align-items: center; justify-content: center;
    }

    .edit-media-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px;
      background: rgba(255,255,255,.04); border-radius: 10px; padding: 8px 10px;
      border: 1.5px solid var(--border-md);
    }
    .edit-media-thumb {
      width: 48px; height: 48px; flex-shrink: 0;
      border-radius: 8px; border: 2px dashed var(--border-md);
      background: rgba(0,61,165,.2); position: relative; cursor: pointer;
      overflow: hidden; display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: var(--yellow);
    }
    .edit-media-thumb input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .edit-media-thumb img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }

    .edit-media-fields { flex: 1; display: flex; flex-direction: column; gap: 5px; }
    .edit-media-fields input {
      width: 100%; padding: 7px 10px; border: 1.5px solid var(--border-md);
      border-radius: 8px; font-family: 'Heebo', sans-serif; font-size: 13px; outline: none;
      background: var(--nav-bg); color: var(--text);
    }
    .edit-media-fields input:focus { border-color: var(--yellow); }

    .edit-media-remove {
      width: 28px; height: 28px; flex-shrink: 0;
      background: var(--slate-bg); border: none; border-radius: 6px;
      cursor: pointer; color: var(--slate); font-size: 14px;
      display: flex; align-items: center; justify-content: center;
    }

    .edit-add-btn {
      width: 100%; padding: 9px; border: 2px dashed var(--border-md);
      border-radius: 10px; background: transparent;
      font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700;
      color: var(--yellow); cursor: pointer; transition: all .15s;
      margin-bottom: 4px;
    }
    .edit-add-btn:hover { border-color: var(--yellow); background: rgba(255,222,0,.08); }

    .edit-storage-note {
      background: rgba(255,222,0,.1); border: 1.5px solid rgba(255,222,0,.35); border-radius: 8px;
      padding: 8px 12px; font-size: 11px; color: var(--yellow); margin-bottom: 14px; line-height: 1.6;
    }

    /* ── REGION PILLS ── */
    .region-pill-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
    .region-pill {
      border: 1.5px solid var(--border-md); border-radius: 20px; padding: 6px 12px;
      font-size: 12px; font-weight: 600; color: var(--text-sm); cursor: pointer;
      background: var(--nav-bg); transition: all .15s; user-select: none;
    }
    .region-pill.selected { background: rgba(255,222,0,.15); border-color: var(--yellow); color: var(--yellow); }

    /* ── קטגוריה (עיגולים) + תגיות + בנאי הטבה — זהה ל-business-dashboard.html ── */
    .cat-circle-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 4px; }
    .cat-circle-item {
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      cursor: pointer; padding: 8px 2px; border-radius: 12px;
      border: 2px solid transparent; transition: all .15s; text-align: center; user-select: none;
    }
    .cat-circle-item:hover { background: rgba(255,255,255,.04); }
    .cat-circle-item.active { border-color: var(--yellow); background: rgba(255,222,0,.08); }
    .cat-circle {
      width: 46px; height: 46px; border-radius: 50%;
      background: var(--nav-bg); display: flex; align-items: center; justify-content: center;
      font-size: 20px; transition: all .15s;
    }
    .cat-circle-item.active .cat-circle { background: rgba(255,222,0,.15); }
    .cat-circle-label { font-size: 10px; font-weight: 600; color: var(--text-sm); line-height: 1.3; }
    .cat-circle-item.active .cat-circle-label { color: var(--yellow); }

    .edit-cat-hint {
      font-size: 11px; color: var(--text-sm); margin-bottom: 14px; line-height: 1.5;
      background: rgba(255,255,255,.04); border-radius: 8px; padding: 8px 10px;
    }

    .tags-area {
      margin-top: 12px; overflow: hidden; max-height: 0; opacity: 0;
      transition: max-height .3s ease, opacity .2s ease;
    }
    .tags-area.open { max-height: 900px; opacity: 1; }
    .tag-chip-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 10px; }
    .tag-chip {
      font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 20px;
      background: var(--nav-bg); color: var(--text-sm); border: 1.5px solid var(--border-md);
      cursor: pointer; transition: all .15s; user-select: none;
    }
    .tag-chip.selected { background: rgba(255,222,0,.12); color: var(--yellow); border-color: var(--yellow); }
    .tag-chip.disabled { opacity: .35; cursor: not-allowed; }
    .no-tag-chip { border-style: dashed; }
    .no-tag-chip.selected { background: rgba(217,119,6,.12); color: var(--orange); border-color: var(--orange); border-style: dashed; }

    .disc-type-chip-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
    .disc-type-chip {
      font-size: 12px; font-weight: 600; padding: 7px 13px; border-radius: 10px;
      background: var(--nav-bg); color: var(--text-sm); border: 1.5px solid var(--border-md);
      cursor: pointer; transition: all .15s; user-select: none;
    }
    .disc-type-chip.selected { background: rgba(255,222,0,.12); color: var(--yellow); border-color: var(--yellow); }
    .disc-type-chip.disabled { opacity: .35; cursor: not-allowed; }
    .disc-fields { display: none; margin-top: 12px; }
    .disc-fields.visible { display: block; }
    .char-count { font-size: 10px; color: var(--text-muted); text-align: left; margin-top: -8px; margin-bottom: 10px; }
    .char-count.warn { color: var(--orange); }
    .disc-redeem-note {
      font-size: 12px; color: var(--text-sm); margin-top: 10px; padding: 8px 12px;
      border-radius: 10px; background: rgba(255,222,0,.06); border: 1px solid rgba(255,222,0,.2);
    }

    /* ── BULK SELECT ── */
    .select-all-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .select-all-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 14px;
      border-radius: 20px;
      border: 2px solid var(--border-md);
      background: var(--card-bg);
      font-family: 'Heebo', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-sm);
      cursor: pointer;
      transition: all .15s;
    }

    .select-all-btn.active { background: rgba(255,222,0,.15); border-color: var(--yellow); color: var(--yellow); }

    .sel-count {
      font-size: 13px;
      color: var(--text-sm);
      font-weight: 600;
    }

    .biz-card-checkbox {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border-md);
      background: var(--nav-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .15s;
      cursor: pointer;
      font-size: 13px;
      color: transparent;
    }

    .biz-card.selected .biz-card-checkbox {
      background: var(--yellow);
      border-color: var(--yellow);
      color: var(--blue-dark);
    }

    .biz-card.selected {
      outline: 2px solid var(--yellow);
      outline-offset: -1px;
      background: rgba(255,222,0,.05);
    }

    /* ── BULK BAR ── */
    .bulk-bar {
      position: fixed;
      bottom: -80px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 32px);
      max-width: 600px;
      background: var(--nav-bg);
      border: 1px solid var(--border);
      border-radius: 18px 18px 0 0;
      padding: 14px 20px 22px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 500;
      box-shadow: 0 -4px 24px rgba(0,0,0,.35);
      transition: bottom .3s cubic-bezier(.17,.67,.46,1.2);
    }

    .bulk-bar.show { bottom: 0; }

    .bulk-bar-label {
      color: rgba(255,255,255,.75);
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .bulk-bar-label strong { color: var(--yellow); }

    .bulk-bar .btn { flex: 1; min-width: 80px; padding: 10px 12px; font-size: 13px; }

    .btn-bulk-approve { background: linear-gradient(135deg, #16a34a, #15803d); color: var(--white); box-shadow: 0 4px 12px rgba(22,163,74,.35); }
    .btn-bulk-reject  { background: rgba(255,255,255,.12); color: var(--white); border: 1.5px solid rgba(255,255,255,.2); }
    .btn-bulk-cancel  { background: transparent; color: rgba(255,255,255,.5); border: 1.5px solid rgba(255,255,255,.15); flex: none; min-width: auto; padding: 10px 14px; font-size: 12px; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a1a;
      color: var(--white);
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      z-index: 999;
      transition: transform .3s cubic-bezier(.17,.67,.46,1.3);
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header class="topbar">
  <a class="back-btn" href="admin.html">› חזרה</a>
  <div class="topbar-title">🏪 ניהול <span>עסקים</span></div>
</header>

<div class="page">

  <div class="stats-row">
    <div class="stat-card">
      <div class="num" id="statTotal">0</div>
      <div class="lbl">עסקים נרשמו</div>
    </div>
    <div class="stat-card pending">
      <div class="num" id="statPending">0</div>
      <div class="lbl">ממתינים לאישור</div>
    </div>
    <div class="stat-card approved">
      <div class="num" id="statApproved">0</div>
      <div class="lbl">עסקים פעילים</div>
    </div>
  </div>

  <div class="main-tabs">
    <button class="main-tab active" data-tab="list" onclick="switchTab('list')">📋 רשימת עסקים</button>
    <button class="main-tab" data-tab="sections" onclick="switchTab('sections')">🗂️ ניהול סקשנים</button>
    <button class="main-tab" data-tab="stats" onclick="switchTab('stats')">📊 מרכז נתונים</button>
  </div>

  <div id="listTabView">
    <div class="filter-bar">
      <button class="filter-btn active" data-val="all">הכל</button>
      <button class="filter-btn" data-val="pending">ממתינים</button>
      <button class="filter-btn" data-val="approved">מאושרים</button>
      <button class="filter-btn" data-val="rejected">נדחו</button>
      <button class="filter-btn filter-changes" data-val="changes" id="filterChangesBtn">✏️ שינויים <span class="changes-badge" id="changesBadge">0</span></button>
      <input class="search-box" type="search" id="searchInput" placeholder="🔍  חיפוש שם עסק / בעלים..." />
    </div>

    <div class="select-all-row" id="selectAllRow" style="display:none">
      <button class="select-all-btn" id="selectAllBtn" onclick="toggleSelectAll()">☐ בחר הכל</button>
      <span class="sel-count" id="selCount"></span>
    </div>

    <div id="bizList"></div>
  </div>

  <div id="sectionsTabView" style="display:none">
    <input class="search-box" type="search" id="sectionsSearch" placeholder="🔍  חיפוש עסק..." style="margin-bottom:14px;width:100%;box-sizing:border-box;" />
    <div id="sectionsTable"></div>
  </div>

  <div id="statsTabView" style="display:none">
    <input class="search-box" type="search" id="statsSearch" placeholder="🔍  חיפוש עסק..." style="margin-bottom:14px;width:100%;box-sizing:border-box;" />
    <div id="statsTable"></div>
  </div>

</div>

<!-- BULK ACTION BAR -->
<div class="bulk-bar" id="bulkBar">
  <div class="bulk-bar-label">נבחרו <strong id="bulkCount">0</strong></div>
  <button class="btn btn-bulk-approve" onclick="bulkApprove()">✅ אשר נבחרים</button>
  <button class="btn btn-bulk-reject"  onclick="bulkReject()">✗ דחה נבחרים</button>
  <button class="btn btn-bulk-cancel"  onclick="clearSelection()">ביטול</button>
</div>

<!-- IMAGE LIGHTBOX -->
<div class="img-lightbox-overlay" id="imgLightboxOverlay" onclick="if(event.target===this)closeImageLightbox()">
  <button class="lightbox-close-btn" onclick="closeImageLightbox()">✕</button>
  <button class="lightbox-dl-btn" onclick="downloadCurrentLightboxImage()">⬇ הורד</button>
  <button class="lightbox-nav-btn prev" id="lightboxPrevBtn" onclick="event.stopPropagation();lightboxNext()">‹</button>
  <img id="lightboxImg" src="" alt="" />
  <button class="lightbox-nav-btn next" id="lightboxNextBtn" onclick="event.stopPropagation();lightboxPrev()">›</button>
</div>

<!-- VIEW SHEET -->
<div class="view-sheet-overlay" id="viewSheet" onclick="if(event.target===this)closeViewSheet()">
  <div class="view-sheet">
    <div class="view-sheet-header">
      <div class="biz-avatar">🏪</div>
      <div>
        <div class="view-sheet-title" id="vsTitle"></div>

<script type="module">
import { db, auth, getStorageLazy } from './firebase-config.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js';
import {
  collection, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp,
  addDoc, query, where, getDocs, getDoc, runTransaction
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
import {
  ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-storage.js";

async function uploadFile(file, path) {
  const storageRef = ref(await getStorageLazy(), path);
  const snap = await uploadBytes(storageRef, file);
  return await getDownloadURL(snap.ref);
}

// ── דחיסת תמונה לפני העלאה (canvas) — הקובץ המקורי מהטלפון יכול להיות כמה MB ──────────────────────
function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function dataUrlToFile(dataUrl, filename) {
  const [meta, b64] = dataUrl.split(',');
  const mime = meta.match(/:(.*?);/)[1];
  const bin  = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new File([bytes], filename, { type: mime });
}
function compressImageFile(file, maxDim = 1280, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    fileToDataUrl(file).then(rawDataUrl => {
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          const scale = maxDim / Math.max(width, height);
          width  = Math.round(width  * scale);
          height = Math.round(height * scale);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = rawDataUrl;
    }).catch(reject);
  });
}
async function compressToFile(file, maxDim, quality, filename) {
  const dataUrl = await compressImageFile(file, maxDim, quality);
  return dataUrlToFile(dataUrl, filename || file.name);
}
// מעלה גרסה מלאה-אך-דחוסה (1280px) + thumbnail קטן (400px, לכרטיסים בפיד home.html) של אותה תמונה.
// נראות הכרטיס לא משתנה — רק כמות המידע שיורדת ברשת. נופל בחזרה להעלאת המקור אם הדחיסה נכשלת.
async function uploadImageWithThumb(file, basePath) {
  try {
    const [mainFile, thumbFile] = await Promise.all([
      compressToFile(file, 1280, 0.82, file.name),
      compressToFile(file, 400, 0.75, 'thumb_' + file.name),
    ]);
    const [url, thumbUrl] = await Promise.all([
      uploadFile(mainFile, basePath),
      uploadFile(thumbFile, basePath + '_thumb'),
    ]);
    return { url, thumbUrl };
  } catch (e) {
    console.error('⚠️ image compression failed, falling back to original file:', e);
    return { url: await uploadFile(file, basePath), thumbUrl: '' };
  }
}

// מגן מפני ערך תקול שנשמר בעבר בטעות (באג ישן: img.src='' נפתר לכתובת הדף עצמו, לא למחרוזת ריקה)
function looksLikeImageUrl(url) {

// ── תמונה קטנה עם לייטבוקס בלחיצה (במקום טאב חדש) + כפתור הורדה בודד ─────────
// כל תמונה שמוצגת באותה פתיחת גיליון נרשמת ל-currentLightboxImages, כדי לתמוך בניווט ‹ › בלייטבוקס
let currentLightboxImages = [];

function mediaThumbHtml(url, alt, w, h, filename) {

    </div>`;
}

function renderLightboxCurrent() {
  const item = currentLightboxImages[lightboxIndex];
  if (!item) return;
  lightboxCurrentUrl = item.url;
  lightboxCurrentFilename = item.filename;
  document.getElementById('lightboxImg').src = item.url;

// מוריד דרך שרת הפיתוח המקומי (server.ps1, /api/download-image) — עוקף חסימת CORS
// של הדפדפן על fetch() ישיר לכתובת Firebase Storage. ⚠️ עובד רק בסביבת הפיתוח המקומית —
// בפרודקשן (GitHub Pages, ללא שרת) יהיה צורך בהגדרת CORS על ה-bucket עצמו (ר' PROJECT_CONTEXT סעיף 12)
window.downloadImage = function(url, filename) {
  if (!url) return;
  const proxyUrl = '/api/download-image?url=' + encodeURIComponent(url) + '&filename=' + encodeURIComponent(filename || 'image.jpg');
  const a = document.createElement('a');
  a.href = proxyUrl;
  a.download = filename || 'image.jpg';
  document.body.appendChild(a);
  a.click();
  a.remove();
};

// קוד כניסה קבוע (6 ספרות) — מחליף את ה-OTP. נבדקת ייחודיות מול Firestore לפני שימוש
async function generateLoginCode() {
  for (let i = 0; i < 20; i++) {
    const code = String(Math.floor(100000 + Math.random() * 900000));
    const snap = await getDocs(query(collection(db, 'members'), where('loginCode', '==', code)));
    if (snap.empty) return code;
  }
  throw new Error('לא הצלחנו להגריל קוד ייחודי');
}

// ── אישור עסק מאשר אוטומטית את חברות האוהד המקושרת ─────────────────────────
// עדיפות ל-ownerMemberId (קישור קבוע, לא תלוי בעדכון טלפון/מייל מאוחר) —
// נתיב legacy לפי מייל נשאר רק לעסקים שטרם קושרו (לפני המיגרציה)
async function approveLinkedMember(b) {
  try {
    let memberId = b.ownerMemberId || null;
    if (!memberId) {
      const email = b.ownerEmail || b.email || '';
      if (!email) return;
      const msnap = await getDocs(query(collection(db, 'members'), where('email', '==', email)));
      if (msnap.empty) return;
      memberId = msnap.docs[0].id;
    }
    const memberRef = doc(db, 'members', memberId);
    const memberSnap = await getDoc(memberRef);
    if (!memberSnap.exists()) return;
    const m = memberSnap.data();
    if (m.status === 'approved') return;
    const counterRef = doc(db, 'counters', 'members');
    const memberNumber = await runTransaction(db, async (tx) => {
      const snap = await tx.get(counterRef);
      const current = snap.exists() ? (snap.data().nextNumber || 1) : 1;
      tx.set(counterRef, { nextNumber: current + 1 });
      return current;
    });
    const loginCode = m.loginCode || await generateLoginCode();
    await updateDoc(memberRef, {
      status: 'approved',
      approvedAt: serverTimestamp(),
      rejectedAt: null,
      isBusinessOwner: true,
      memberNumber,
      loginCode,
      loginCodeCreatedAt: serverTimestamp(),
      loginCodeEmailStatus: 'pending',
    });
  } catch (e) {
    console.error('approveLinkedMember failed', e);
  }
}

// admin guard — session אמיתי (Firebase Auth) + isAdmin:true על רשומת החבר
await new Promise(resolve => {
  const unsub = onAuthStateChanged(auth, async user => {
    unsub();
    if (!user) { location.href = 'landing-demo.html'; return; }
    const snap = await getDoc(doc(db, 'members', user.uid));
    if (!snap.exists() || snap.data().isAdmin !== true) { location.href = 'home.html'; return; }
    resolve();
  });
});

function nowStr() {
  return new Date().toLocaleDateString('he-IL') + ' ' +
         new Date().toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' });
}

function timeAgo(ts) {
  if (!ts) return '—';
  const ms = ts.toDate ? Date.now() - ts.toDate() : Date.now() - new Date(ts);
  const m = Math.floor(ms / 60000);
  if (m < 60)   return m + ' דק\'';
  if (m < 1440) return Math.floor(m/60) + ' שע\'';
  return Math.floor(m/1440) + ' ימים';
}

function regDateShort(ts) {
  if (!ts?.toDate) return '—';
  return ts.toDate().toLocaleDateString('he-IL');
}

function regDateFull(ts) {
  if (!ts?.toDate) return '<span class="missing">—</span>';
  const d = ts.toDate();
  return d.toLocaleDateString('he-IL') + ' · ' + d.toLocaleTimeString('he-IL', { hour:'2-digit', minute:'2-digit' });
}

function esc(v) {
  return (v == null ? '' : String(v)).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function waitingChip(ts) {
  if (!ts) return '<span class="chip fresh">🟢 חדש</span>';
  const hrs = (Date.now() - ts.toDate()) / 3600000;
  if (hrs >= 24) return `<span class="chip long">📅 נרשם ${regDateShort(ts)}</span>`;
  const [cls, icon] = hrs < 6 ? ['fresh','🟢'] : ['medium','🟠'];
  return `<span class="chip ${cls}">${icon} ממתין ${timeAgo(ts)}</span>`;
}

window.toggleSecEdit = function(n) {
  const view = document.getElementById('secView' + n);
  const edit = document.getElementById('secEdit' + n);
  if (!edit) return;
  const opening = !edit.classList.contains('open');
  edit.classList.toggle('open', opening);
  if (view) view.style.display = opening ? 'none' : '';
};

window.toggleRegionAdmin = function(el) {
  el.classList.toggle('selected');
};

window.editToggleBizType = function(el) {
  el.classList.toggle('selected');
  const selected = [...document.querySelectorAll('#editBizTypeGrid .region-pill.selected')].map(p => p.dataset.type);
  const regWrap = document.getElementById('editRegionWrap');
  const webWrap = document.getElementById('editWebsiteOnlineWrap');
  if (regWrap) regWrap.style.display = selected.includes('pro') ? 'block' : 'none';
  if (webWrap) webWrap.style.display = selected.includes('online') ? 'block' : 'none';
};

window.closeViewSheet = function() {
  document.getElementById('viewSheet').classList.remove('open');
  document.body.style.overflow = '';
};

// ── stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('statTotal').textContent    = businesses.length;
  document.getElementById('statPending').textContent  = businesses.filter(b => b.status === 'pending').length;
  document.getElementById('statApproved').textContent = businesses.filter(b => b.status === 'approved').length;

  const changesCount = businesses.filter(b => b.pendingChanges).length;
  document.getElementById('changesBadge').textContent = changesCount;
}

// ── render ────────────────────────────────────────────────────────────────────
function render() {
  const search   = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = businesses.filter(b => {
    const matchF = activeFilter === 'all'
      ? true
      : activeFilter === 'changes'
        ? !!b.pendingChanges
        : b.status === activeFilter;
    const matchS = !search ||
      (b.name || '').toLowerCase().includes(search) ||
      (b.ownerFirst + ' ' + b.ownerLast).toLowerCase().includes(search);
    return matchF && matchS;
  });

  updateStats();
  const list = document.getElementById('bizList');

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>לא נמצאו עסקים</p></div>`;
    return;
  }

  // הצג/הסתר שורת "בחר הכל"
  document.getElementById('selectAllRow').style.display = filtered.length ? 'flex' : 'none';
  updateBulkBar();

  list.innerHTML = filtered.map(b => {
    const ownerName  = `${b.ownerFirst || ''} ${b.ownerLast || ''}`.trim();
    const types      = b.bizTypes || [];
    const isOnline   = types.includes('online');

    const typeStr  = types.map(t => BIZ_TYPE_LABELS[t]).filter(Boolean).join(' · ');
    const firstBranch = (b.branches || [])[0];
    const metaStr  = [typeStr, firstBranch?.city].filter(Boolean).join(' · ') || (isOnline ? 'אונליין' : '—');

    const isSelected = selectedIds.has(b.id);

    const pendingBadge = b.pendingChanges
      ? `<span class="chip pending-edit" title="בעל העסק שלח שינויים לאישור">✏️ שינויים</span>`
      : '';

    return `
    <div class="biz-card ${b.status}${isSelected ? ' selected' : ''}" id="card-${b.id}">
      <div class="card-header" onclick="openBizSheet('${b.id}')" style="cursor:pointer;">
        <div class="biz-card-checkbox" onclick="event.stopPropagation();toggleSelect('${b.id}')">${isSelected ? '✓' : ''}</div>
        <div class="biz-avatar">🏪</div>
        <div class="card-info">
          <div class="card-name">${b.name || '—'} ${pendingBadge}</div>
          <div class="card-meta">${metaStr}</div>
        </div>
        ${statusChip(b)}
        <span class="chevron">›</span>
      </div>
    </div>`;
  }).join('');
}

// ── sections control view ────────────────────────────────────────────────────
function fmtDateHe(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('he-IL');
}

function isSecNewActive(b) {
  return !!(b.isNew && b.newUntil && new Date() < new Date(b.newUntil));
}

function isSecFeaturedActive(b) {
  return !!(b.isFeatured && (!b.featuredUntil || new Date() < new Date(b.featuredUntil)));
}

function isLikesOverrideActive(b) {
  return b.likesOverride != null && (!b.likesOverrideUntil || new Date() < new Date(b.likesOverrideUntil));
}

function likesOverrideCellHtml(b) {
  if (isLikesOverrideActive(b)) {
    const untilLine = b.likesOverrideUntil ? `עד ${fmtDateHe(b.likesOverrideUntil)}` : 'קבוע';
    const setLine = b.likesOverrideSetAt ? `הופעל ${fmtDateHe(b.likesOverrideSetAt)}` : '';
    return `<div class="sec-cell">
      <span class="sec-badge-ro on">${b.likesOverride}</span>
      <div class="sec-active-line">${untilLine}${setLine ? ` · ${setLine}` : ''}</div>
      <button class="sec-mini-btn" onclick="clearLikesOverride('${b.id}')">הסר, חזרה למספר האמיתי</button>
    </div>`;
  }
  return `<div class="sec-cell">
    <div class="sec-setup-row">
      <input type="number" class="sec-days-input" id="likesVal-${b.id}" min="0" placeholder="מס'" />
      <span style="font-size:10px;color:var(--text-sm)">מספר לב להצגה</span>
    </div>
    <div class="sec-setup-row">
      <input type="number" class="sec-days-input" id="likesDays-${b.id}" min="1" placeholder="ימים" />
      <span style="font-size:10px;color:var(--text-sm)">ימים (ריק=קבוע)</span>
    </div>
    <button class="sec-activate-btn" onclick="activateLikesOverride('${b.id}')">💙 הפעל</button>
  </div>`;
}

function newCellHtml(b) {
  if (isSecNewActive(b)) {
    return `<div class="sec-cell">
      <span class="sec-badge-ro on">✨ פעיל</span>
      <div class="sec-active-line">עד ${fmtDateHe(b.newUntil)} <button class="sec-mini-btn" onclick="clearSectionFlag('${b.id}','new')">הסר</button></div>
    </div>`;
  }
  return `<div class="sec-cell">
    <div class="sec-setup-row">
      <input type="number" class="sec-days-input" id="newDays-${b.id}" value="30" min="1" />
      <span style="font-size:10px;color:var(--text-sm)">ימים</span>
    </div>
    <button class="sec-activate-btn" onclick="activateSectionFlag('${b.id}','new')">✨ הפעל</button>
  </div>`;
}

function featuredCellHtml(b) {
  if (isSecFeaturedActive(b)) {
    const line = b.featuredUntil ? `עד ${fmtDateHe(b.featuredUntil)}` : 'קבוע';
    return `<div class="sec-cell">
      <span class="sec-badge-ro on">⭐ נבחר</span>
      <div class="sec-active-line">${line} <button class="sec-mini-btn" onclick="clearSectionFlag('${b.id}','featured')">הסר</button></div>
    </div>`;
  }
  return `<div class="sec-cell">
    <button class="sec-activate-btn" onclick="activateSectionFlag('${b.id}','featured')">⭐ סמן קבוע</button>
    <div class="sec-setup-row">
      <input type="number" class="sec-days-input" id="featuredDays-${b.id}" placeholder="ימים" min="1" />
      <button class="sec-mini-btn" onclick="activateSectionFlag('${b.id}','featured',true)">זמני</button>
    </div>
  </div>`;
}

function dealsCellHtml(b) {
  if (!b.discountText) return `<span class="sec-badge-ro">אין הטבה</span>`;
  const on = b.sectionDeals !== false;
  return `<button class="toggle${on ? ' on' : ''}" title="${b.discountText}" onclick="toggleDealsSection('${b.id}',${on})"></button>`;
}

async function applySectionUpdate(id, updates, msg) {
  await updateDoc(doc(db, 'businesses', id), updates);
  const b = businesses.find(x => x.id === id);
  if (b) Object.assign(b, updates);
  if (msg) showToast(msg);
  if (document.getElementById('viewSheet').classList.contains('open')) openBizSheet(id);
  if (activeTab === 'sections') renderSectionsView();
}

window.activateSectionFlag = async function(id, kind, temp) {
  if (kind === 'new') {
    const days = parseInt(document.getElementById(`newDays-${id}`)?.value, 10) || 30;
    const until = new Date(Date.now() + days * 86400000).toISOString();
    await applySectionUpdate(id, { isNew: true, newUntil: until }, '✨ סומן כ"חדש אצלנו"');
  } else if (kind === 'featured') {
    let until = null;
    if (temp) {
      const days = parseInt(document.getElementById(`featuredDays-${id}`)?.value, 10);
      if (!days || days < 1) { showToast('נא להזין מספר ימים תקין'); return; }
      until = new Date(Date.now() + days * 86400000).toISOString();
    }
    await applySectionUpdate(id, { isFeatured: true, featuredUntil: until }, '⭐ סומן כעסק נבחר');
  }
};

window.clearSectionFlag = async function(id, kind) {
  if (kind === 'new') {
    await applySectionUpdate(id, { isNew: false, newUntil: null }, 'הוסר');
  } else {
    await applySectionUpdate(id, { isFeatured: false, featuredUntil: null }, 'הוסר');
  }
};

window.toggleDealsSection = async function(id, current) {
  await applySectionUpdate(id, { sectionDeals: !current });
};

window.activateLikesOverride = async function(id) {
  const val = parseInt(document.getElementById(`likesVal-${id}`)?.value, 10);
  if (isNaN(val) || val < 0) { showToast('נא להזין מספר תקין'); return; }
  const days = parseInt(document.getElementById(`likesDays-${id}`)?.value, 10);
  const until = (days && days > 0) ? new Date(Date.now() + days * 86400000).toISOString() : null;
  await applySectionUpdate(id, { likesOverride: val, likesOverrideUntil: until, likesOverrideSetAt: new Date().toISOString() }, '💙 מספר הלב עודכן');
};

window.clearLikesOverride = async function(id) {
  await applySectionUpdate(id, { likesOverride: null, likesOverrideUntil: null, likesOverrideSetAt: null }, 'הוסר, חוזר למספר האמיתי');
};

function renderSectionsView() {
  const wrap   = document.getElementById('sectionsTable');
  const search = (document.getElementById('sectionsSearch')?.value || '').trim().toLowerCase();
  const approvedAll = businesses.filter(b => b.status === 'approved');
  const shown = approvedAll.filter(b => !search || (b.name || '').toLowerCase().includes(search));

  if (!shown.length) {
    wrap.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>לא נמצאו עסקים מאושרים</p></div>`;
    return;
  }

  const popularRanked = [...approvedAll].sort((a, b) => (b.clicks || 0) - (a.clicks || 0)).slice(0, 5).map(b => b.id);

  wrap.innerHTML = `
    <div class="sections-table-wrap">
      <table class="sections-table">
        <thead><tr>
          <th>עסק</th><th>✨ חדש אצלנו</th><th>⭐ נבחר</th><th>💛 הטבות שוות</th><th>🔥 פופולרי</th><th>🌐 אונליין</th>
        </tr></thead>
        <tbody>
          ${shown.map(b => `
            <tr>
              <td>${b.name || '—'}</td>
              <td>${newCellHtml(b)}</td>
              <td>${featuredCellHtml(b)}</td>
              <td>${dealsCellHtml(b)}</td>
              <td>${popularRanked.includes(b.id) ? `<span class="sec-badge-ro on">🔥 #${popularRanked.indexOf(b.id) + 1}</span>` : `<span class="sec-badge-ro">—</span>`}</td>
              <td>${(b.bizTypes || []).includes('online') ? `<span class="sec-badge-ro on">כן</span>` : `<span class="sec-badge-ro">—</span>`}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

// ── מרכז נתונים — צפיות + כוכבים per עסק ──────────────────────────────────────
let statsSort = { key: 'clicks', dir: 'desc' };

function renderStatsView() {
  const wrap   = document.getElementById('statsTable');
  const search = (document.getElementById('statsSearch')?.value || '').trim().toLowerCase();
  const approvedAll = businesses.filter(b => b.status === 'approved');
  const shown = approvedAll.filter(b => !search || (b.name || '').toLowerCase().includes(search));

  if (!shown.length) {
    wrap.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>לא נמצאו עסקים מאושרים</p></div>`;
    return;
  }

  const rows = shown.map(b => ({
    id: b.id, name: b.name || '—', cat: CAT_LABELS[mapCatKey(b.categoryPrimary || b.cat)] || b.categoryPrimary || '—',
    clicks: b.clicks || 0, likes: (b.likedBy || []).length,
  }));
  rows.sort((a, b) => (a[statsSort.key] - b[statsSort.key]) * (statsSort.dir === 'asc' ? 1 : -1));

  const totalClicks = rows.reduce((s, r) => s + r.clicks, 0);
  const totalLikes  = rows.reduce((s, r) => s + r.likes, 0);

  const arrow = key => statsSort.key !== key ? '' : (statsSort.dir === 'asc' ? ' ▲' : ' ▼');

  wrap.innerHTML = `
    <div class="stats-row" style="margin-bottom:16px;">
      <div class="stat-card"><div class="num">${totalClicks}</div><div class="lbl">👁 סה"כ צפיות</div></div>
      <div class="stat-card" title="סך האוהדים שסימנו לב לעסקים באינדקס"><div class="num">${totalLikes}</div><div class="lbl">💙 סה"כ לבבות</div></div>
    </div>
    <div class="sections-table-wrap">
      <table class="sections-table">
        <thead><tr>
          <th>עסק</th><th>קטגוריה</th>
          <th style="cursor:pointer" onclick="setStatsSort('clicks')">👁 צפיות${arrow('clicks')}</th>
          <th style="cursor:pointer" onclick="setStatsSort('likes')" title="מספר האוהדים שסימנו לב לעסק באינדקס">💙 לבבות${arrow('likes')}</th>
        </tr></thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td>${r.name}</td>
              <td>${r.cat}</td>
              <td>${r.clicks}</td>
              <td>${r.likes}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

window.setStatsSort = function(key) {
  statsSort.dir = (statsSort.key === key && statsSort.dir === 'desc') ? 'asc' : 'desc';
  statsSort.key = key;
  renderStatsView();
};

// ── bulk select ──────────────────────────────────────────────────────────────
function getFilteredIds() {
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  return businesses.filter(b => {
    const matchF = activeFilter === 'all' || b.status === activeFilter;
    const matchS = !search ||
      (b.name || '').toLowerCase().includes(search) ||
      (b.ownerFirst + ' ' + b.ownerLast).toLowerCase().includes(search);
    return matchF && matchS;
  }).map(b => b.id);
}

function updateBulkBar() {
  const count = selectedIds.size;
  const bar   = document.getElementById('bulkBar');
  document.getElementById('bulkCount').textContent = count;
  bar.classList.toggle('show', count > 0);

  // עדכן כפתור "בחר הכל"
  const allIds = getFilteredIds();
  const allSelected = allIds.length > 0 && allIds.every(id => selectedIds.has(id));
  const btn = document.getElementById('selectAllBtn');
  btn.textContent = allSelected ? '☑ בטל בחירת הכל' : '☐ בחר הכל';
  btn.classList.toggle('active', allSelected);

  const selCount = document.getElementById('selCount');
  selCount.textContent = count > 0 ? `${count} נבחרו` : '';
}

window.toggleSelect = function(id) {
  if (selectedIds.has(id)) {
    selectedIds.delete(id);
  } else {
    selectedIds.add(id);
  }
  // עדכן כרטיס בלי re-render מלא
  const card = document.getElementById('card-' + id);
  if (card) {
    const isSel = selectedIds.has(id);
    card.classList.toggle('selected', isSel);
    const cb = card.querySelector('.biz-card-checkbox');
    if (cb) cb.textContent = isSel ? '✓' : '';
  }
  updateBulkBar();
};

window.selectByStatus = function(status) {
  const ids = businesses.filter(b => b.status === status).map(b => b.id);
  const allSelected = ids.every(id => selectedIds.has(id));
  if (allSelected) {
    ids.forEach(id => selectedIds.delete(id));
  } else {
    ids.forEach(id => selectedIds.add(id));
  }
  render();
};

window.toggleSelectAll = function() {
  const allIds = getFilteredIds();
  const allSelected = allIds.every(id => selectedIds.has(id));
  if (allSelected) {
    allIds.forEach(id => selectedIds.delete(id));
  } else {
    allIds.forEach(id => selectedIds.add(id));
  }
  render();
};

window.clearSelection = function() {
  selectedIds.clear();
  render();
};

window.bulkApprove = async function() {
  const ids = [...selectedIds].filter(id => {
    const b = businesses.find(x => x.id === id);
    return b && b.status === 'pending';
  });
  if (!ids.length) { showToast('אין עסקים ממתינים בבחירה'); return; }
  if (!confirm(`לאשר ${ids.length} עסקים?`)) return;
  await Promise.all(ids.map(async id => {
    await updateDoc(doc(db, 'businesses', id), { status: 'approved', approvedAt: serverTimestamp(), ownerEmailStatus: 'pending' });
    const b = businesses.find(x => x.id === id);
    if (b) await approveLinkedMember(b);
  }));
  selectedIds.clear();
  showToast(`✅ ${ids.length} עסקים אושרו`);
};

window.bulkReject = async function() {
  const ids = [...selectedIds].filter(id => {
    const b = businesses.find(x => x.id === id);
    return b && b.status === 'pending';
  });
  if (!ids.length) { showToast('אין עסקים ממתינים בבחירה'); return; }
  if (!confirm(`לדחות ${ids.length} עסקים?`)) return;
  await Promise.all(ids.map(id =>
    updateDoc(doc(db, 'businesses', id), { status: 'rejected', rejectedAt: serverTimestamp() })
  ));
  selectedIds.clear();
  showToast(`✗ ${ids.length} עסקים נדחו`);
};

// ── filter + search ───────────────────────────────────────────────────────────
document.querySelector('.filter-bar').addEventListener('click', e => {
  const btn = e.target.closest('[data-val]');
  if (!btn) return;
  activeFilter = btn.dataset.val;
  document.querySelectorAll('[data-val]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
});

document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('sectionsSearch').addEventListener('input', renderSectionsView);
document.getElementById('statsSearch').addEventListener('input', renderStatsView);

// ── message templates ────────────────────────────────────────────────────────
const DEFAULT_TPL_WA      = 'היי {name} 👋\nברוך הבא ל-Yellow Zone! 💛\n\nהעסק שלך "{business}" אושר לאינדקס.\n\n🔗 קישור לניהול העסק שלך (עריכת פרטים, תמונות ועוד): {dashboard_link}\n\nביחד ננצח 🏆';
const DEFAULT_TPL_MAIL    = 'שלום {name},\n\nשמחים לבשר שהעסק "{business}" אושר לאינדקס הבלעדי שלנו!\n\nהנה הקישור האישי שלך לניהול העסק — עריכת פרטים, הוספת תמונות ועוד:\n{dashboard_link}\n\nבאהבה,\nצוות Yellow Zone 💛';
const DEFAULT_TPL_SUBJECT = 'העסק שלך אושר לאינדקס Yellow Zone 💛';

function getTpl(key, fallback) {
  return localStorage.getItem('_hb_tpl_' + key) || fallback;
}

function dashboardLinkFor(b) {
  return b.accessToken ? `${location.origin}${location.pathname.replace(/[^/]*$/, '')}business-dashboard.html?token=${b.accessToken}` : '';
}

function applyTpl(tpl, b) {
  const name = `${b.ownerFirst || ''} ${b.ownerLast || ''}`.trim();
  return tpl.replace(/\{name\}/g, name).replace(/\{business\}/g, b.name || '').replace(/\{dashboard_link\}/g, dashboardLinkFor(b));
}

function buildWA(b)   { return applyTpl(getTpl('wa', DEFAULT_TPL_WA), b); }
function buildMail(b) { return applyTpl(getTpl('mail', DEFAULT_TPL_MAIL), b); }
function getMailSubject(b) { return applyTpl(getTpl('mailSubject', DEFAULT_TPL_SUBJECT), b); }


window.openModal = function(id) {
  pendingId = id;
  const b = businesses.find(x => x.id === id);
  const ownerName = `${b.ownerFirst || ''} ${b.ownerLast || ''}`.trim();
  document.getElementById('modalSub').textContent = `${b.name} · ${ownerName}`;
  document.getElementById('waPreview').value       = buildWA(b);
  document.getElementById('mailPreview').value     = buildMail(b);
  const confirmBtn = document.getElementById('confirmBtn');
  confirmBtn.textContent = '✅ אשר עסק';
  confirmBtn.disabled = false;
  confirmBtn.style.opacity = '1';
  const waBtn = document.getElementById('modalWaBtn');
  waBtn.textContent = '📲 WhatsApp';
  waBtn.style.opacity = '1';
  waBtn.style.pointerEvents = 'auto';
  const mailBtn = document.getElementById('modalMailBtn');
  mailBtn.textContent = '✉️ מייל';
  mailBtn.style.opacity = '1';
  mailBtn.style.pointerEvents = 'auto';
  document.getElementById('approveModal').classList.add('open');
};

window.copyDashboardLink = function() {
  const url = document.getElementById('modalDashboardLink').dataset.url;
  navigator.clipboard.writeText(url).then(() => showToast('✅ הקישור הועתק!'));
};

window.closeModal = function() {
  document.getElementById('approveModal').classList.remove('open');
  pendingId = null;
};

document.getElementById('confirmBtn').addEventListener('click', async () => {
  const b = businesses.find(x => x.id === pendingId);
  await updateDoc(doc(db, 'businesses', pendingId), {
    status: 'approved',
    approvedAt: serverTimestamp(),
    ownerEmailStatus: 'pending'
  });
  if (b) await approveLinkedMember(b);
  document.getElementById('confirmBtn').textContent = '✓ אושר!';
  document.getElementById('confirmBtn').disabled = true;
  document.getElementById('confirmBtn').style.opacity = '.5';
  showToast(`✅ "${b.name}" אושר!`);
});

window.modalSendWA = function() {
  const b  = businesses.find(x => x.id === pendingId);
  const waText = document.getElementById('waPreview').value;
  const ph = (b.ownerPhone || b.phone || '').replace(/\D/g,'');
  const waPhone = ph.startsWith('0') ? '972' + ph.slice(1) : ph;
  window.open(`https://wa.me/${waPhone}?text=${encodeURIComponent(waText)}`, '_blank');
  const btn = document.getElementById('modalWaBtn');
  btn.textContent = '✓ נשלח WhatsApp';
  btn.style.opacity = '.5';
  btn.style.pointerEvents = 'none';
};

window.modalSendMail = function() {
  const b = businesses.find(x => x.id === pendingId);
  const mailText = document.getElementById('mailPreview').value;
  const email = b.ownerEmail || b.email || '';
  const subject = getMailSubject(b);
  const gmailUrl = `https://mail.google.com/mail/?view=cm&to=${encodeURIComponent(email)}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(mailText)}`;
  window.open(gmailUrl, '_blank');
  const btn = document.getElementById('modalMailBtn');
  btn.textContent = '✓ מייל נפתח';
  btn.style.opacity = '.5';
  btn.style.pointerEvents = 'none';
};

let _pendingEditMode = false;

window.editPendingChanges = function(id) {
  const b = businesses.find(x => x.id === id);
  if (!b?.pendingChanges) return;
  const section = document.querySelector('.pending-section[data-biz-id="' + id + '"]');
  if (!section) return;
  _pendingEditMode = true;
  section.querySelectorAll('.pending-row').forEach(row => {
    if (row.dataset.simple !== 'true') return;
    const key = row.dataset.key;
    const val = b.pendingChanges[key] ?? '';
    const cell = row.querySelector('.pending-new');
    cell.innerHTML = `<input type="text" class="pending-edit-input" data-key="${key}" value="${esc(String(val))}" />`;
  });
  const editBtn = section.querySelector('.btn-pending-edit');
  if (editBtn) editBtn.style.display = 'none';
};

window.approvePendingChanges = async function(id) {
  const b = businesses.find(x => x.id === id);
  if (!b?.pendingChanges) return;
  let changes = { ...b.pendingChanges };
  if (_pendingEditMode) {
    document.querySelectorAll('.pending-edit-input').forEach(input => {
      changes[input.dataset.key] = input.value;
    });
  }
  const updates = { ...changes, pendingChanges: null, pendingChangesAt: null };
  await updateDoc(doc(db, 'businesses', id), updates);
  showToast('✅ שינויים אושרו ועודכנו!');
  _pendingEditMode = false;
  closeViewSheet();
};

window.rejectPendingChanges = async function(id) {
  if (!confirm('לדחות את השינויים שבעל העסק שלח?')) return;
  await updateDoc(doc(db, 'businesses', id), { pendingChanges: null, pendingChangesAt: null });
  _pendingEditMode = false;
  showToast('✗ שינויים נדחו');
  closeViewSheet();
};

window.rejectBiz = async function(id) {
  const b = businesses.find(x => x.id === id);
  if (b.status === 'approved') {
    if (!confirm(`לבטל אישור של "${b.name}"?`)) return;
    await updateDoc(doc(db, 'businesses', id), { status: 'pending', approvedAt: null });
    showToast(`↩ אישור בוטל — "${b.name}" חזר להמתנה`);
  } else {
    if (!confirm(`לדחות את "${b.name}"?`)) return;
    await updateDoc(doc(db, 'businesses', id), { status: 'rejected', rejectedAt: serverTimestamp() });
    showToast('העסק נדחה');
  }
};

window.deleteBiz = async function(id) {
  const b = businesses.find(x => x.id === id);
  if (!confirm(`למחוק לצמיתות את "${b?.name || id}"?\nפעולה זו אינה ניתנת לביטול.`)) return;
  await deleteDoc(doc(db, 'businesses', id));
  showToast(`🗑️ "${b?.name || id}" נמחק`);
};

function renderTagsBar() {

  if (!area || !bar) return;
  const cat = CATEGORIES.find(c => c.key === selectedCat);

  if (!cat) { bar.innerHTML = ''; return; }
  label.innerHTML = `בחרו תגית אחת לפחות (עד ${MAX_TAGS}) מתוך "${cat.label}"`;
  bar.innerHTML = cat.tags.map(t => {
    const sel = selectedTags.includes(t);
    const dis = noTagFits || (!sel && selectedTags.length >= MAX_TAGS);
    return `<div class="tag-chip${sel ? ' selected' : ''}${dis ? ' disabled' : ''}" onclick="${dis ? '' : `toggleTag('${t.replace(/'/g,"\\'")}')`}">${t}</div>`;
  }).join('');
  const chip = document.getElementById('editNoTagFitsChip');
  if (chip) chip.classList.toggle('selected', noTagFits);
}

window.toggleTag = function(tag) {

function getDiscType(n)       { return n === 2 ? discType2 : discType3; }
function setDiscType(n, v)    { if (n === 2) discType2 = v; else discType3 = v; }
function getRedeemModeN(n)    { return n === 2 ? redeemMode2 : redeemMode3; }
function setRedeemModeN(n, v) { if (n === 2) redeemMode2 = v; else redeemMode3 = v; }

function renderDiscTypeGridN(n) {

}

  setDiscType(n, getDiscType(n) === key ? null : key);
  renderDiscTypeGridN(n);
  onDiscBuilderInputN(n);
};

function renderRedeemModeGridN(n) {
  const grid = document.getElementById('editRedeemModeGrid' + n);
  if (!grid) return;
  const hasCode = !!document.getElementById('editDiscountCode' + n)?.value.trim();
  const mode = getRedeemModeN(n);
  const opts = [
    { key: 'physical', icon: '🏪', label: 'בחנות הפיזית' },
    { key: 'sale',     icon: '🤝', label: 'במעמד המכירה / השירות' },
  ];
  grid.innerHTML = opts.map(o =>
    `<div class="disc-type-chip${(!hasCode && mode === o.key) ? ' selected' : ''}${hasCode ? ' disabled' : ''}" onclick="${hasCode ? '' : `selectRedeemModeN(${n},'${o.key}')`}">${o.icon} ${o.label}</div>`
  ).join('');
}

window.selectRedeemModeN = function(n, key) {
  setRedeemModeN(n, key);
  renderRedeemModeGridN(n);
  onDiscBuilderInputN(n);
};

function updateDiscOtherCountN(n) {
  const input = document.getElementById('editDiscOtherText' + n);
  const count = document.getElementById('editDiscOtherCount' + n);
  if (!input || !count) return;
  const len = input.value.length;
  count.textContent = `${len} / 50`;
  count.classList.toggle('warn', len > 45);
}

function computeDiscBuilderTextN(n) {
  const val = fid => document.getElementById(fid + n)?.value.trim() || '';
  switch (getDiscType(n)) {
    case 'percent': { const v = val('editDiscPercentVal'); const on = val('editDiscPercentOn'); return v ? `${v}% הנחה` + (on ? ` על ${on}` : '') : ''; }
    case 'gift':    { const w = val('editDiscGiftWhat'); return w ? `${w} חינם` : ''; }
    case 'buyget':  { const x = val('editDiscBuyX'); const y = val('editDiscBuyY'); return (x && y) ? `קנה ${x} קבל ${y}` : ''; }
    case 'shipping':{ const d = val('editDiscShipDetail'); return 'משלוח חינם' + (d ? ` ${d}` : ''); }
    case 'price':   return val('editDiscPriceDetail');
    case 'other':   return val('editDiscOtherText');
    default:        return '';
  }
}

function discBuilderSnapshotN(n) {
  const val = fid => document.getElementById(fid + n)?.value.trim() || '';
  return {
    type:        getDiscType(n),
    percent:     val('editDiscPercentVal'),
    percentOn:   val('editDiscPercentOn'),
    giftWhat:    val('editDiscGiftWhat'),
    buyX:        val('editDiscBuyX'),
    buyY:        val('editDiscBuyY'),
    shipDetail:  val('editDiscShipDetail'),
    priceDetail: val('editDiscPriceDetail'),
    otherText:   val('editDiscOtherText'),
  };
}

function updateDiscRedeemNoteN(n) {
  const note = document.getElementById('editDiscRedeemNote' + n);
  if (!note) return;
  const code = document.getElementById('editDiscountCode' + n)?.value.trim() || '';
  const dTypes = computeDiscountTypes(_editingBizTypes, !!code, getRedeemModeN(n));
  note.textContent = 'כך יוצג באתר: ' + dTypes.map(t => DISCOUNT_TYPE_LABELS[t] || t).join(', ');
}

window.onDiscBuilderInputN = function(n) {
  updateDiscOtherCountN(n);
  updateDiscRedeemNoteN(n);
  renderRedeemModeGridN(n);
};

function collectAdditionalBenefits() {
  const arr = [];
  for (let n = 2; n <= benefitCount; n++) {
    const text = computeDiscBuilderTextN(n);
    if (!text) continue;
    const code = document.getElementById('editDiscountCode' + n).value.trim();
    const redeemMode = getRedeemModeN(n);
    arr.push({
      text, code, redeemMode,
      redeemTypes: computeDiscountTypes(_editingBizTypes, !!code, redeemMode),
      builder: discBuilderSnapshotN(n),
    });
  }
  return arr;
}

function updateDiscRedeemNote() {
  const note = document.getElementById('editDiscRedeemNote');
  if (!note) return;
  const code = document.getElementById('editDiscountCode')?.value.trim() || '';
